<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>命运方舟市场工具</title>
  <style>
    *{box-sizing:border-box}body{margin:0;font-family:"Microsoft YaHei",Arial,sans-serif;color:#111827;background:#f6f8fb}.shell{max-width:1040px;margin:0 auto;padding:42px 22px}.top{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:28px;margin-bottom:22px}h1{margin:0 0 8px;font-size:34px}.sub{color:#64748b;line-height:1.6}.support-qr{width:428px;max-width:42vw;border:1px solid #e5e7eb;border-radius:8px;background:#fff;box-shadow:0 12px 28px rgba(15,23,42,.07)}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.card{display:block;text-decoration:none;color:inherit;background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:20px;box-shadow:0 12px 28px rgba(15,23,42,.07)}.card h2{margin:0 0 8px;font-size:22px}.card p{margin:0;color:#64748b;line-height:1.55}@media(max-width:720px){.top{grid-template-columns:1fr}.support-qr{width:100%;max-width:428px} .grid{grid-template-columns:1fr}h1{font-size:28px}}
  </style>
</head>
<body>
  <main class="shell">
    <section class="top">
      <div>
        <h1>命运方舟市场工具</h1>
        <p class="sub">礼包性价比分析、宝石价格指数和公开数据接口统一发布在这里。</p>
      </div>
      <img class="support-qr" src="./assets/support-author-428.jpg" alt="支持作者收款码" width="428" height="428">
    </section>
    <section class="grid">
      <a class="card" href="./pages/gift-pack-value.html">
        <h2>礼包分析页</h2>
        <p>按金币折算、人民币成本和内容估值查看礼包性价比。</p>
      </a>
      <a class="card" href="./pages/gem-dashboard.html">
        <h2>宝石价格指数仪表盘</h2>
        <p>查看宝石走势、金价换算与刻印书价格。</p>
      </a>
    </section>
  </main>
</body>
</html>
