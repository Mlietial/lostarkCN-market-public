<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>命运方舟市场工具</title>
  <style>
    *{box-sizing:border-box}body{margin:0;font-family:"Microsoft YaHei",Arial,sans-serif;color:#111827;background:#f6f8fb}.shell{max-width:1040px;margin:0 auto;padding:42px 22px}.top{margin-bottom:22px}.title-row{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:8px}h1{margin:0;font-size:34px}.updated-at{color:#64748b;font-size:13px;font-weight:600;white-space:nowrap}.sub{color:#64748b;line-height:1.6}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.card{display:block;text-decoration:none;color:inherit;background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:20px;box-shadow:0 12px 28px rgba(15,23,42,.07)}.card h2{margin:0 0 8px;font-size:22px}.card p{margin:0;color:#64748b;line-height:1.55}.creator-card{display:flex;align-items:center;gap:16px}.creator-avatar{width:82px;height:82px;flex:0 0 auto;border-radius:50%;object-fit:cover;border:2px solid #e0f2fe;background:#fff}.creator-tag{display:inline-flex;align-items:center;margin-bottom:7px;padding:3px 8px;border-radius:999px;background:#f0f9ff;color:#0284c7;font-size:12px;font-weight:700}.creator-name{margin:0 0 6px;font-size:22px;font-weight:700}.support-card{grid-column:1 / -1;text-align:center;cursor:pointer;user-select:none}.support-card h2{margin-bottom:0}.support-card.is-open h2{margin-bottom:14px}.support-card:not(.is-open) .support-qr{display:none}.support-qr{display:block;width:428px;max-width:100%;height:auto;margin:0 auto;border:1px solid #e5e7eb;border-radius:8px;background:#fff;box-shadow:0 12px 28px rgba(15,23,42,.07)}@media(max-width:720px){.grid{grid-template-columns:1fr}h1{font-size:28px}.updated-at{font-size:12px}.creator-card{align-items:flex-start}.creator-avatar{width:72px;height:72px}}
  </style>
</head>
<body>
  <main class="shell">
    <section class="top">
      <div class="title-row"><h1>命运方舟市场工具</h1><span id="dataUpdatedAt" class="updated-at" aria-live="polite"></span></div>
      <p class="sub">国服命运方舟礼包性价比分析、宝石价格指数和金币走势</p>
    </section>
    <section class="grid">
      <a class="card" href="./pages/gift-pack-value.html">
        <h2>礼包分析页</h2>
        <p>按金币折算、人民币成本和内容估值查看礼包性价比。</p>
      </a>
      <a class="card" href="./pages/gem-dashboard.html">
        <h2>宝石价格指数仪表盘</h2>
        <p>查看宝石走势、金价换算与刻印书价格。</p>
      </a>
      <a class="card" href="./pages/gold-trend.html">
        <h2>金价走势仪表盘</h2>
        <p>查看邮寄和拍卖交易的金币比例走势。</p>
      </a>
      <a class="card" href="./pages/material-trend.html">
        <h2>材料价格趋势</h2>
        <p>查看强化材料、碎片袋和辅助材料的价格走势。</p>
      </a>
      <a class="card creator-card" href="https://space.bilibili.com/1628012" target="_blank" rel="noopener noreferrer">
        <img class="creator-avatar" src="./assets/freshwater-fish-monster-avatar.jpg" alt="淡水鱼怪头像" width="82" height="82">
        <div>
          <span class="creator-tag">Bilibili</span>
          <div class="creator-name">淡水鱼怪</div>
          <p>点击前往淡水鱼怪的 B 站空间。</p>
        </div>
      </a>
      <section class="card support-card" aria-label="支持作者">
        <h2>支持作者</h2>
        <img class="support-qr" src="./assets/support-author-428.jpg" alt="支持作者收款码" width="428" height="428">
      </section>
    </section>
  </main>
  <script>
    const dataUpdatedAt = document.getElementById('dataUpdatedAt');
    const formatDataUpdatedAt = (value) => {
      if (!value) return '';
      const normalized = String(value).trim().replace(' ', 'T');
      const date = new Date(normalized);
      if (Number.isNaN(date.getTime())) return String(value).trim().slice(0, 16);
      const pad = (n) => String(n).padStart(2, '0');
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
    };

    fetch('./data/dashboard-state.json', { cache: 'no-store' })
      .then((response) => response.ok ? response.json() : null)
      .then((data) => {
        const text = formatDataUpdatedAt(data && data.publishedAt);
        if (dataUpdatedAt && text) dataUpdatedAt.textContent = `数据更新时间 ${text}`;
      })
      .catch(() => {});

    const supportCard = document.querySelector('.support-card');

    if (supportCard) {
      supportCard.setAttribute('role', 'button');
      supportCard.setAttribute('tabindex', '0');
      supportCard.setAttribute('aria-expanded', 'false');

      const toggleSupport = () => {
        const isOpen = supportCard.classList.toggle('is-open');
        supportCard.setAttribute('aria-expanded', String(isOpen));
      };

      supportCard.addEventListener('click', toggleSupport);
      supportCard.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          toggleSupport();
        }
      });
    }
  </script>
</body>
</html>
