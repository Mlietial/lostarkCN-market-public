  <script>
    const DATA_URL = "../data/dashboard-state.json";
    const MAIL = "邮寄交易";
    const AUC = "拍卖交易";
    const CHART_PAGE = 30;
    let state = { publishedAt: "", txns: [], history: [] };
    let chartOffset = 0;
    let chartResizeTimer = null;
    let selectedDate = "";
    let calendarMonth = "";

    const fmt = n => Number.isFinite(n) ? Math.round(n).toLocaleString("zh-CN") : "—";
    const money = n => Number.isFinite(n) ? "¥" + Number(n).toFixed(2) : "—";
    const pct = n => Number.isFinite(n) ? (n >= 0 ? "+" : "") + n.toFixed(2) + "%" : "—";
    const costPer10k = rate => rate > 0 ? 10000 / rate : null;
    const rateOf = t => t && t.gold > 0 && t.price > 0 ? t.gold / t.price : null;
    const pad2 = n => String(n).padStart(2, "0");
    const monthKey = date => String(date || "").slice(0, 7);
    const escapeHtml = value => String(value ?? "").replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
    const mid = values => {
      const arr = values.filter(Number.isFinite).sort((a, b) => a - b);
      if (!arr.length) return null;
      const i = Math.floor(arr.length / 2);
      return arr.length % 2 ? arr[i] : (arr[i - 1] + arr[i]) / 2;
    };
    const maxFinite = values => {
      const arr = values.filter(Number.isFinite);
      return arr.length ? Math.max(...arr) : null;
    };
    const clsPriceChange = n => !Number.isFinite(n) || Math.abs(n) < .001 ? "muted" : n > 0 ? "price-up" : "price-down";

    function setGoldPageLoadState(mode, message) {
      document.body.classList.remove("gold-loading", "gold-ready", "gold-error");
      document.body.classList.add("gold-" + mode);
      const text = document.getElementById("goldPageLoaderText");
      if (text && message) text.textContent = message;
    }

    function addMonths(ym, delta) {
      if (!ym) return "";
      const [year, month] = ym.split("-").map(Number);
      const date = new Date(year, month - 1 + delta, 1);
      return `${date.getFullYear()}-${pad2(date.getMonth() + 1)}`;
    }

    function monthLabel(ym) {
      if (!ym) return "—";
      const [year, month] = ym.split("-");
      return `${year}年${Number(month)}月`;
    }

    function historyMap() {
      return new Map(state.history.map(row => [row.date, row]));
    }

    function latestDate() {
      return state.history[state.history.length - 1]?.date || "";
    }

    function earliestDate() {
      return state.history[0]?.date || "";
    }

    function txnsForDate(date) {
      return state.txns.filter(t => t.date === date);
    }

    function selectLatestDateInMonth(ym) {
      const rows = state.history.filter(row => monthKey(row.date) === ym);
      if (rows.length) selectedDate = rows[rows.length - 1].date;
    }

    function syncCalendarSelection() {
      const latest = latestDate();
      const hasSelected = selectedDate && state.history.some(row => row.date === selectedDate);
      if (!hasSelected) selectedDate = latest;
      if (!calendarMonth) calendarMonth = monthKey(selectedDate || latest);
    }

    function buildHistory(txns) {
      const byDate = {};
      txns.forEach(t => {
        if (!t.date || !(t.gold > 0) || !(t.price > 0)) return;
        if (!byDate[t.date]) byDate[t.date] = { date: t.date, mail: [], auc: [], count: 0 };
        const bucket = t.type === MAIL ? byDate[t.date].mail : byDate[t.date].auc;
        bucket.push(rateOf(t));
        byDate[t.date].count += 1;
      });
      return Object.values(byDate).sort((a, b) => a.date.localeCompare(b.date)).map(row => {
        const mailMid = mid(row.mail), aucMid = mid(row.auc);
        const mailMax = maxFinite(row.mail), aucMax = maxFinite(row.auc);
        return {
          date: row.date,
          mailMid,
          aucMid,
          mailMax,
          aucMax,
          mailCost: costPer10k(mailMid),
          aucCost: costPer10k(aucMid),
          mailMaxCost: costPer10k(mailMax),
          aucMaxCost: costPer10k(aucMax),
          mailCount: row.mail.length,
          aucCount: row.auc.length,
          count: row.count
        };
      });
    }

    function readEmbeddedData() {
      try {
        return JSON.parse(document.getElementById("EMBEDDED_GOLD_DATA")?.textContent || "{}");
      } catch (error) {
        return {};
      }
    }

    async function fetchGoldData() {
      if (location.protocol === "file:") {
        const embedded = readEmbeddedData();
        return Array.isArray(embedded?.goldTxns) ? embedded : (window.LOSTARK_PUBLIC_DASHBOARD_STATE || embedded);
      }
      try {
        const res = await fetch(DATA_URL + "?v=" + Date.now(), { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        return await res.json();
      } catch (error) {
        throw error;
      }
    }

    async function loadData() {
      const status = document.getElementById("status");
      setGoldPageLoadState("loading", "正在加载 dashboard-state.json...");
      status.textContent = "加载中...";
      const data = await fetchGoldData();
      state = {
        publishedAt: data.publishedAt || "",
        txns: Array.isArray(data.goldTxns) ? data.goldTxns : [],
        history: buildHistory(Array.isArray(data.goldTxns) ? data.goldTxns : [])
      };
      chartOffset = Math.min(chartOffset, maxChartOffset());
      syncCalendarSelection();
      status.textContent = state.publishedAt ? "数据更新时间 " + state.publishedAt : "";
      setGoldPageLoadState("ready");
      render();
    }

    function maxChartOffset() {
      return state.history.length ? Math.max(0, Math.ceil(state.history.length / CHART_PAGE) - 1) : 0;
    }

    function visibleHistory() {
      const total = state.history.length;
      const end = Math.max(0, total - chartOffset * CHART_PAGE);
      const start = Math.max(0, end - CHART_PAGE);
      return state.history.slice(start, end);
    }

    function latestWith(key) {
      for (let i = state.history.length - 1; i >= 0; i--) {
        if (Number.isFinite(state.history[i][key])) return state.history[i];
      }
      return null;
    }

    function changeFor(key) {
      const rows = state.history.filter(row => Number.isFinite(row[key]));
      if (rows.length < 2) return NaN;
      const prev = rows[rows.length - 2][key];
      const last = rows[rows.length - 1][key];
      return prev > 0 ? (last - prev) / prev * 100 : NaN;
    }

    function renderKpis() {
      const mail = latestWith("mailCost"), auc = latestWith("aucCost");
      const mailChg = changeFor("mailCost"), aucChg = changeFor("aucCost");
      const dates = state.history.map(row => row.date);
      const cards = [
        ["邮寄金币价格", `${money(mail?.mailCost)} / 万金`, `${mail?.date || "—"} · 较前次 <b class="${clsPriceChange(mailChg)}">${pct(mailChg)}</b> · 比例 ${fmt(mail?.mailMid)} 金/元`],
        ["拍卖金币价格", `${money(auc?.aucCost)} / 万金`, `${auc?.date || "—"} · 较前次 <b class="${clsPriceChange(aucChg)}">${pct(aucChg)}</b> · 比例 ${fmt(auc?.aucMid)} 金/元`],
        ["交易记录", fmt(state.txns.length) + " 条", `${dates[0] || "—"} 至 ${dates[dates.length - 1] || "—"}`],
        ["采样天数", fmt(state.history.length) + " 日", "按每日中间价聚合，抗极端单"]
      ];
      document.getElementById("kpiGrid").innerHTML = cards.map(card => `<div class="card kpi"><span>${card[0]}</span><b>${card[1]}</b><em>${card[2]}</em></div>`).join("");
    }

    function pathFor(rows, key, x, y) {
      return rows.filter(row => Number.isFinite(row[key])).map((row, i) => `${i ? "L" : "M"}${x(row.date).toFixed(1)},${y(row[key]).toFixed(1)}`).join(" ");
    }

    function renderChart() {
      const wrap = document.getElementById("costChart");
      if (!state.history.length) {
        wrap.innerHTML = '<div class="muted">暂无金价数据</div>';
        document.getElementById("goldRangeLabel").textContent = "—";
        return;
      }
      const rows = visibleHistory();
      const dates = rows.map(row => row.date);
      const values = rows.flatMap(row => [row.mailCost, row.aucCost, row.mailMaxCost, row.aucMaxCost]).filter(Number.isFinite);
      const min = Math.min(...values), max = Math.max(...values);
      const pad = Math.max(1, (max - min) * .12);
      const lo = min - pad, hi = max + pad;
      const wrapStyle = getComputedStyle(wrap);
      const contentWidth = wrap.clientWidth - (parseFloat(wrapStyle.paddingLeft) || 0) - (parseFloat(wrapStyle.paddingRight) || 0);
      const contentHeight = wrap.clientHeight - (parseFloat(wrapStyle.paddingTop) || 0) - (parseFloat(wrapStyle.paddingBottom) || 0);
      const h = 400;
      const measuredAspect = contentWidth > 0 && contentHeight > 0 ? contentWidth / contentHeight : 980 / 400;
      const w = Math.max(360, Math.round(h * measuredAspect));
      const m = { l: contentWidth < 600 ? 58 : 78, r: contentWidth < 600 ? 24 : 34, t: 24, b: 54 };
      const x = date => m.l + (dates.indexOf(date) / Math.max(1, dates.length - 1)) * (w - m.l - m.r);
      const y = value => m.t + (hi - value) / Math.max(1, hi - lo) * (h - m.t - m.b);
      const grid = Array.from({ length: 5 }, (_, i) => {
        const v = lo + (hi - lo) * i / 4;
        const yy = y(v);
        return `<line class="gridline" x1="${m.l}" y1="${yy}" x2="${w - m.r}" y2="${yy}"/><text class="tick" x="${m.l - 10}" y="${yy + 4}" text-anchor="end">${money(v)}</text>`;
      }).join("");
      const tickStep = Math.max(1, Math.ceil(rows.length / 8));
      const lastTickIndex = rows.length - 1;
      const minGapBeforeLastTick = 2;
      const xTicks = rows.map((row, i) => (i % tickStep === 0 && lastTickIndex - i >= minGapBeforeLastTick) || i === lastTickIndex
        ? `<text class="tick" x="${x(row.date)}" y="${h - 18}" text-anchor="middle">${row.date.slice(5)}</text>`
        : "").join("");
      const circles = rows.map((row, index) => [
        Number.isFinite(row.mailCost) ? `<circle class="marker" data-point-index="${index}" style="--series:var(--mail)" cx="${x(row.date)}" cy="${y(row.mailCost)}" r="4"/>` : "",
        Number.isFinite(row.mailMaxCost) ? `<circle class="marker max" data-point-index="${index}" style="--series:var(--mail-high)" cx="${x(row.date)}" cy="${y(row.mailMaxCost)}" r="4"/>` : "",
        Number.isFinite(row.aucCost) ? `<circle class="marker" data-point-index="${index}" style="--series:var(--auc)" cx="${x(row.date)}" cy="${y(row.aucCost)}" r="4"/>` : "",
        Number.isFinite(row.aucMaxCost) ? `<circle class="marker max" data-point-index="${index}" style="--series:var(--auc-high)" cx="${x(row.date)}" cy="${y(row.aucMaxCost)}" r="4"/>` : ""
      ].join("")).join("");
      const hitAreas = rows.map((row, index) => {
        const currentX = x(row.date);
        const previousX = index ? x(rows[index - 1].date) : m.l;
        const nextX = index < rows.length - 1 ? x(rows[index + 1].date) : w - m.r;
        const left = index === 0 ? m.l : (previousX + currentX) / 2;
        const right = index === rows.length - 1 ? w - m.r : (currentX + nextX) / 2;
        return `<rect class="chart-hit" data-chart-index="${index}" data-chart-x="${currentX.toFixed(1)}" x="${left.toFixed(1)}" y="${m.t}" width="${Math.max(1, right - left).toFixed(1)}" height="${h - m.t - m.b}" tabindex="0" role="button" aria-label="${row.date} 金价详情"/>`;
      }).join("");
      wrap.innerHTML = `<div class="tooltip" id="tooltip" role="status" aria-live="polite"></div><svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet" role="img" aria-label="邮寄与拍卖每万金币人民币成本走势图"><rect x="0" y="0" width="${w}" height="${h}" fill="transparent"/>${grid}${xTicks}<path class="series" style="--series:var(--mail)" d="${pathFor(rows, "mailCost", x, y)}" stroke="var(--mail)"/><path class="series max" style="--series:var(--mail-high)" d="${pathFor(rows, "mailMaxCost", x, y)}" stroke="var(--mail-high)"/><path class="series" style="--series:var(--auc)" d="${pathFor(rows, "aucCost", x, y)}" stroke="var(--auc)"/><path class="series max" style="--series:var(--auc-high)" d="${pathFor(rows, "aucMaxCost", x, y)}" stroke="var(--auc-high)"/>${circles}<line class="chart-guide" id="chartGuide" x1="0" x2="0" y1="${m.t}" y2="${h - m.b}"/>${hitAreas}<text class="axis-label" x="${m.l}" y="15">每万金币成本（人民币）</text></svg>`;
      document.getElementById("goldRangeLabel").textContent = rows.length ? `${rows[0].date} - ${rows[rows.length - 1].date}` : "—";
      document.getElementById("goldOlderBtn").disabled = chartOffset >= maxChartOffset();
      document.getElementById("goldNewerBtn").disabled = chartOffset <= 0;
      const tip = wrap.querySelector("#tooltip");
      const guide = wrap.querySelector("#chartGuide");
      const tooltipLine = (label, cost, rate, color) => Number.isFinite(cost)
        ? `<div class="gold-tooltip-row"><i style="--series:${color}"></i><span>${label}</span><strong>${money(cost)} / 万金</strong><small>兑换比例 ${fmt(rate)} 金/元</small></div>`
        : "";
      const hideTooltip = () => {
        tip.classList.remove("show");
        guide.classList.remove("visible");
        wrap.querySelectorAll(".marker.is-hovered").forEach(point => point.classList.remove("is-hovered"));
      };
      const showTooltip = (hit, event) => {
        const index = Number(hit.dataset.chartIndex);
        const row = rows[index];
        if (!row) return;
        tip.innerHTML = `<time>${row.date}</time>${[
            tooltipLine("邮寄均价", row.mailCost, row.mailMid, "var(--mail)"),
            tooltipLine("邮寄最低价", row.mailMaxCost, row.mailMax, "var(--mail-high)"),
            tooltipLine("拍卖均价", row.aucCost, row.aucMid, "var(--auc)"),
            tooltipLine("拍卖最低价", row.aucMaxCost, row.aucMax, "var(--auc-high)")
        ].join("")}`;
        tip.classList.add("show");
        guide.setAttribute("x1", hit.dataset.chartX);
        guide.setAttribute("x2", hit.dataset.chartX);
        guide.classList.add("visible");
        wrap.querySelectorAll(".marker").forEach(point => point.classList.toggle("is-hovered", Number(point.dataset.pointIndex) === index));

        const rect = wrap.getBoundingClientRect();
        const hitRect = hit.getBoundingClientRect();
        const pointerX = event && Number.isFinite(event.clientX) ? event.clientX : hitRect.left + hitRect.width / 2;
        const pointerY = event && Number.isFinite(event.clientY) ? event.clientY : hitRect.top + Math.min(90, hitRect.height / 2);
        const tipW = tip.offsetWidth || 224;
        const tipH = tip.offsetHeight || 150;
        let left = pointerX - rect.left + 14;
        if (left + tipW > wrap.clientWidth - 8) left = pointerX - rect.left - tipW - 14;
        let top = pointerY - rect.top - tipH / 2;
        left = Math.max(8, Math.min(left, wrap.clientWidth - tipW - 8));
        top = Math.max(8, Math.min(top, wrap.clientHeight - tipH - 8));
        tip.style.left = left + "px";
        tip.style.top = top + "px";
      };
      wrap.querySelectorAll(".chart-hit").forEach(hit => {
        hit.addEventListener("pointerenter", event => showTooltip(hit, event));
        hit.addEventListener("pointermove", event => showTooltip(hit, event));
        hit.addEventListener("focus", () => showTooltip(hit));
        hit.addEventListener("blur", hideTooltip);
      });
      wrap.onpointerleave = hideTooltip;
    }

    function renderCalendar() {
      const wrap = document.getElementById("goldCalendar");
      const label = document.getElementById("calendarMonthLabel");
      const map = historyMap();
      label.textContent = monthLabel(calendarMonth);
      if (!calendarMonth) {
        wrap.innerHTML = '<div class="day-empty" style="grid-column:1 / -1">暂无金价日历数据</div>';
        return;
      }
      const [year, month] = calendarMonth.split("-").map(Number);
      const first = new Date(year, month - 1, 1);
      const start = new Date(first);
      start.setDate(first.getDate() - ((first.getDay() + 6) % 7));
      const cells = [];
      for (let i = 0; i < 42; i++) {
        const date = new Date(start);
        date.setDate(start.getDate() + i);
        const dateText = `${date.getFullYear()}-${pad2(date.getMonth() + 1)}-${pad2(date.getDate())}`;
        const row = map.get(dateText);
        const isCurrentMonth = date.getMonth() === month - 1;
        const classes = ["gold-day"];
        if (!isCurrentMonth) classes.push("out-month");
        if (!row) classes.push("no-data");
        if (dateText === selectedDate) classes.push("selected");
        cells.push(`<button class="${classes.join(" ")}" type="button" data-date="${dateText}" ${row ? "" : "disabled"} aria-label="${dateText}${row ? `，${row.count}条数据` : "，暂无数据"}">
          <div class="gold-day-top"><span class="gold-day-num">${date.getDate()}</span><span class="gold-day-count">${row ? row.count + "条" : ""}</span></div>
          <div class="gold-day-line"><span>邮</span><strong class="mail">${row ? money(row.mailCost) : "—"}</strong></div>
          <div class="gold-day-line"><span>拍</span><strong class="auc">${row ? money(row.aucCost) : "—"}</strong></div>
        </button>`);
      }
      wrap.innerHTML = cells.join("");
      const latestMonth = monthKey(latestDate());
      const earliestMonth = monthKey(earliestDate());
      document.getElementById("calendarPrevMonth").disabled = !earliestMonth || calendarMonth <= earliestMonth;
      document.getElementById("calendarNextMonth").disabled = !latestMonth || calendarMonth >= latestMonth;
      document.getElementById("calendarLatest").disabled = !latestMonth || calendarMonth === latestMonth;
    }

    function renderSelectedDayTxns() {
      const txns = txnsForDate(selectedDate).sort((a, b) => (b.id || "").localeCompare(a.id || ""));
      document.getElementById("selectedDayTitle").textContent = selectedDate ? `当日交易明细 · ${selectedDate} · ${txns.length} 条` : "当日交易明细";
      if (!selectedDate || !txns.length) {
        document.getElementById("txnTable").innerHTML = '<div class="day-empty">暂无当日交易数据</div>';
        return;
      }
      document.getElementById("txnTable").innerHTML = `<table class="data-table"><thead><tr><th>类型</th><th>金币</th><th>标价</th><th>金币价格</th></tr></thead><tbody>${txns.map(t => `<tr><td class="${t.type === MAIL ? "mail" : "auc"}">${escapeHtml(t.type || "—")}</td><td>${fmt(t.gold)}</td><td>${money(t.price)}</td><td><strong>${money(costPer10k(rateOf(t)))} / 万金</strong><br><span class="muted">比例 ${fmt(rateOf(t))} 金/元</span></td></tr>`).join("")}</tbody></table>`;
    }

    function render() {
      document.getElementById("subtitle").textContent = `读取 ${state.txns.length} 条公开金价交易记录，展示每万金币人民币成本走势。`;
      renderKpis();
      renderChart();
      renderCalendar();
      renderSelectedDayTxns();
    }

    document.getElementById("goldOlderBtn").addEventListener("click", () => {
      if (chartOffset < maxChartOffset()) {
        chartOffset++;
        renderChart();
      }
    });
    document.getElementById("goldNewerBtn").addEventListener("click", () => {
      if (chartOffset > 0) {
        chartOffset--;
        renderChart();
      }
    });

    document.getElementById("goldCalendar").addEventListener("click", event => {
      const btn = event.target.closest("[data-date]");
      if (!btn || btn.disabled) return;
      selectedDate = btn.dataset.date;
      calendarMonth = monthKey(selectedDate);
      renderCalendar();
      renderSelectedDayTxns();
    });
    document.getElementById("calendarPrevMonth").addEventListener("click", () => {
      calendarMonth = addMonths(calendarMonth, -1);
      selectLatestDateInMonth(calendarMonth);
      renderCalendar();
      renderSelectedDayTxns();
    });
    document.getElementById("calendarNextMonth").addEventListener("click", () => {
      calendarMonth = addMonths(calendarMonth, 1);
      selectLatestDateInMonth(calendarMonth);
      renderCalendar();
      renderSelectedDayTxns();
    });
    document.getElementById("calendarLatest").addEventListener("click", () => {
      selectedDate = latestDate();
      calendarMonth = monthKey(selectedDate);
      renderCalendar();
      renderSelectedDayTxns();
    });

    document.getElementById("reloadBtn").addEventListener("click", () => loadData().catch(error => {
      document.getElementById("status").textContent = "加载失败：" + (error.message || error);
      setGoldPageLoadState("error", "加载失败：" + (error.message || error));
    }));

    window.addEventListener("resize", () => {
      clearTimeout(chartResizeTimer);
      chartResizeTimer = setTimeout(() => {
        if (document.body.classList.contains("gold-ready")) renderChart();
      }, 120);
    });

    loadData().catch(error => {
      document.getElementById("status").textContent = "加载失败：" + (error.message || error);
      setGoldPageLoadState("error", "加载失败：" + (error.message || error));
    });
  </script>
</body>
</html>
