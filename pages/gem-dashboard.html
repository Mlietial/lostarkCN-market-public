function ensureEngravingModule(){let section=document.getElementById("engravingModule");if(section)return section;const target=document.getElementById("goldCalc")?.closest("section.grid")||document.querySelector("main.app");section=document.createElement("section");section.className="card engraving-section";section.id="engravingModule";section.innerHTML='<div class="engraving-head"><div><h2 class="engraving-title">遗物刻印书价格浮动</h2><div class="engraving-subtitle" id="engravingSubtitle"></div></div><div class="engraving-toolbar" aria-label="刻印书筛选排序"><select id="engravingDateFilter" class="engraving-date-select" aria-label="选择刻印书日期"></select><input id="engravingSearch" class="engraving-search" type="search" placeholder="搜索刻印书" aria-label="搜索刻印书名称"><button class="mini-btn" type="button" data-engraving-sort="lowest">当前最低价</button><button class="mini-btn" type="button" data-engraving-sort="lowVsPrevAvg">较昨均</button></div></div><div id="engravingSummary" class="engraving-summary"></div><div class="engraving-filters" aria-label="刻印书快捷筛选"><button class="mini-btn" type="button" data-engraving-filter="all">全部</button><button class="mini-btn" type="button" data-engraving-filter="highCore">高价核心书</button><button class="mini-btn" type="button" data-engraving-filter="deepDiscount">明显低于昨均</button><button class="mini-btn" type="button" data-engraving-filter="pump">短线抬价</button></div><div id="engravingTableWrap" class="engraving-table-wrap"></div>';if(target&&target.parentNode)target.parentNode.insertBefore(section,target);else document.querySelector("main.app").appendChild(section);return section;}
function enrichEngravingRows(){const historicLows=engravingHistoricLowMap();return engravingBookPrices.map(row=>{const lowVsPrevAvg=(row.lowest-row.prevAvg)/row.prevAvg,lowVsRecentDeal=(row.lowest-row.recentDeal)/row.recentDeal,status=getEngravingStatus(lowVsPrevAvg);return Object.assign({},row,{lowVsPrevAvg,lowVsRecentDeal,status,historicLow:historicLows.get(engravingBookKey(row))||null});});}

function getSelectedEngravingDate(){const dates=getEngravingDates();if(!dates.length)return"";if(!engravingDateFilter||!dates.includes(engravingDateFilter))engravingDateFilter=dates[dates.length-1];return engravingDateFilter;}

function renderEngravingHistoricLowCell(row){const low=row&&row.historicLow;if(!low)return'<div class="engraving-historic-low"><strong>—</strong><span>—</span></div>';const current=Number(row.lowest)===Number(low.lowest);return'<div class="engraving-historic-low '+(current?'is-current':'')+'"><strong>'+formatEngravingNumber(low.lowest)+'</strong><span>'+escapeHtml(low.date||'—')+'</span></div>';}
function getEngravingStatus(rate){if(rate<=-.08)return{text:"明显低于昨均",cls:"deep"};if(rate<=-.03)return{text:"低于昨均",cls:"low"};if(rate>=.08)return{text:"短线抬价",cls:"high"};return{text:"接近均价",cls:"neutral"};}
function formatEngravingNumber(n){return Number.isFinite(Number(n))?Number(n).toLocaleString("zh-CN",{maximumFractionDigits:2}):"—";}
function formatEngravingPercent(rate){if(!Number.isFinite(rate))return"—";const pct=Number((rate*100).toFixed(2));if(pct>0)return"↑ +"+pct.toFixed(2)+"%";if(pct<0)return"↓ "+pct.toFixed(2)+"%";return"0.00%";}
function engravingPctClass(rate){if(!Number.isFinite(rate))return"flat";const pct=Number((rate*100).toFixed(2));return pct>0?"up":pct<0?"down":"flat";}
function getVisibleEngravingRows(){let rows=enrichEngravingRows();const selectedDate=getSelectedEngravingDate();if(selectedDate){rows=rows.filter(row=>engravingDateKey(row)===selectedDate);}const q=engravingSearch.trim().toLowerCase();if(q){rows=rows.filter(row=>window.LostarkPinyinSearch?.match(row.name+" "+row.grade,q)||(row.name+" "+row.grade).toLowerCase().includes(q));}if(engravingFilter==="highCore")rows=rows.filter(row=>row.lowest>=100000);if(engravingFilter==="deepDiscount")rows=rows.filter(row=>row.lowVsPrevAvg<=-.08);if(engravingFilter==="pump")rows=rows.filter(row=>row.lowVsPrevAvg>=.08);const key=engravingSortKey;rows.sort((a,b)=>{let av=a[key],bv=b[key];if(key==="name"){return engravingSortDir*a.name.localeCompare(b.name,"zh-CN");}if(av==null)av=0;if(bv==null)bv=0;return engravingSortDir*(av-bv)||a.pageOrder-b.pageOrder;});return rows;}
function resetEngravingPage(){engravingPage=0;}
function splitEngravingImportLine(line,delimiter){if(delimiter===TAB)return line.split(TAB);if(delimiter===",")return line.split(",");return splitSpaces(line);}
function normalizeEngravingImportText(text){return String(text||"").replace(/\u00a0/g," ").replace(/[，]/g,",").replace(/[：]/g,":").trim();}

function engravingFieldKey(label){const s=String(label||"").trim();if(["date","日期","时间"].includes(s))return"date";if(["name","刻印书","名称","书名","刻印"].includes(s))return"name";if(["grade","品级","等级","品质"].includes(s))return"grade";if(["prevAvg","昨日均价","昨天均价","前一天平均交易价","前日均价","昨均"].includes(s))return"prevAvg";if(["recentDeal","最近成交","最近成交价","成交价"].includes(s))return"recentDeal";if(["lowest","当前最低","当前最低价","最低价","现价"].includes(s))return"lowest";if(["pageOrder","排序","页内排序","游戏排序","序号"].includes(s))return"pageOrder";return null;}

function parseEngravingKeyValueBlocks(raw){if(!/[:=]/.test(raw))return[];const blocks=raw.split(/\n\s*\n/).map(block=>block.trim()).filter(Boolean);const rows=[];blocks.forEach((block,bi)=>{const row={};block.split(/\r?\n/).forEach(line=>{const m=line.match(/^\s*([^:=]+?)\s*[:=]\s*(.+?)\s*$/);if(!m)return;const key=engravingFieldKey(m[1]);if(key)row[key]=m[2];});if(row.name&&row.prevAvg&&row.recentDeal&&row.lowest){rows.push(Object.assign({date:todayLabel(),grade:"遗物",pageOrder:bi+1},row));}});return migrateEngravingBookPrices(rows);}
function parseLooseEngravingLine(line,index){let work=normalizeEngravingImportText(line);if(!work)return null;const date=extractDate(work)||todayLabel();work=work.replace(/([0-9]{4}[/.年-][0-9]{1,2}[/.月-][0-9]{1,2}日?|[0-9]{1,2}[/.月-][0-9]{1,2}日?)/," ");const gradeMatch=work.match(/遗物|传说|史诗|稀有|高级|普通|relic|legendary|epic/i);const grade=gradeMatch?normalizeEngravingGrade(gradeMatch[0]):"遗物";let nums=(work.match(/[\d,]+(?:\.\d+)?/g)||[]).map(n=>cleanNum(n)).filter(n=>n!=null);if(nums.length<3)return null;let pageOrder=index+1;const orderAtStart=work.match(/^\s*(\d{1,3})(?:[).、]|[\s　]+)/);if(orderAtStart&&nums.length>=4&&nums[0]===Number(orderAtStart[1])){pageOrder=nums.shift();}else if(nums.length>=4&&Number.isInteger(nums[nums.length-1])&&nums[nums.length-1]>0&&nums[nums.length-1]<=999){pageOrder=nums.pop();}const lowest=nums.pop(),recentDeal=nums.pop(),prevAvg=nums.pop();let name=work.replace(/[\d,]+(?:\.\d+)?/g," ").replace(/遗物|传说|史诗|稀有|高级|普通|relic|legendary|epic/ig," ").replace(/日期|时间|刻印书|名称|书名|品级|等级|品质|昨日均价|昨天均价|前一天平均交易价|前日均价|昨均|最近成交价?|成交价|当前最低价?|最低价|现价|排序|页内排序|游戏排序|序号/g," ").replace(/[|,;；:：=()（）【】\[\]{}]/g," ").trim();name=splitSpaces(name).join("");return name?{date,name,grade,prevAvg,recentDeal,lowest,pageOrder}:null;}
function parseEngravingTableOrLoose(raw){const lines=raw.split(/\r?\n/).map(line=>line.trim()).filter(Boolean);if(!lines.length)return[];const delimiter=lines[0].includes(TAB)?TAB:(lines[0].includes(",")?",":"space");const headers=splitEngravingImportLine(lines[0],delimiter).map(h=>h.trim());const findHeader=names=>headers.findIndex(h=>names.some(name=>engravingFieldKey(h)===engravingFieldKey(name)));const idx={date:findHeader(["date"]),name:findHeader(["name"]),grade:findHeader(["grade"]),prevAvg:findHeader(["prevAvg"]),recentDeal:findHeader(["recentDeal"]),lowest:findHeader(["lowest"]),pageOrder:findHeader(["pageOrder"])};if(idx.name>=0&&idx.prevAvg>=0&&idx.recentDeal>=0&&idx.lowest>=0){const rows=lines.slice(1).map((line,i)=>{const cells=splitEngravingImportLine(line,delimiter).map(c=>c.trim());return{date:idx.date>=0?cells[idx.date]:todayLabel(),name:cells[idx.name],grade:idx.grade>=0?cells[idx.grade]:"遗物",prevAvg:cleanNum(cells[idx.prevAvg]),recentDeal:cleanNum(cells[idx.recentDeal]),lowest:cleanNum(cells[idx.lowest]),pageOrder:idx.pageOrder>=0?cleanNum(cells[idx.pageOrder]):i+1};});return migrateEngravingBookPrices(rows);}return migrateEngravingBookPrices(lines.map((line,i)=>parseLooseEngravingLine(line,i)).filter(Boolean));}
function parseEngravingImportText(text){const raw=stripEngravingImportComments(text);if(!raw)throw new Error("请先粘贴刻印书数据");const parsed=parseEngravingJsonLike(raw);if(parsed.length)return parsed;const keyed=parseEngravingKeyValueBlocks(raw);if(keyed.length)return keyed;const table=parseEngravingTableOrLoose(raw);if(table.length)return table;throw new Error("没有识别到有效刻印书数据");}
function mergeEngravingBookPrices(existing,incoming){const map=new Map();migrateEngravingBookPrices(existing).forEach(row=>map.set([row.date,row.name,row.grade].join("|"),row));migrateEngravingBookPrices(incoming).forEach(row=>map.set([row.date,row.name,row.grade].join("|"),row));return Array.from(map.values()).sort((a,b)=>String(a.date).localeCompare(String(b.date))||a.pageOrder-b.pageOrder||a.name.localeCompare(b.name,"zh-CN"));}
function applyEngravingImport(mode){const box=document.getElementById("engravingImportText"),status=document.getElementById("engravingImportStatus");try{const rows=parseEngravingImportText(box.value);engravingBookPrices=mode==="replace"?rows:mergeEngravingBookPrices(engravingBookPrices,rows);markDataImported("engraving");persistEngravingBookPrices();engravingDateFilter="";engravingImportOpen=false;resetEngravingPage();if(box)box.value="";if(status)status.textContent="已导入 "+rows.length+" 条，当前共 "+engravingBookPrices.length+" 条";showStatus(mode==="replace"?"刻印书数据已覆盖。":"刻印书数据已导入。",true);renderEngravingModule();}catch(e){if(status)status.textContent="导入失败："+e.message;}}
function deleteEngravingBookPrice(date,name,grade){const targetDate=normalizeDateToken(date)||date;const before=engravingBookPrices.length;engravingBookPrices=engravingBookPrices.filter(row=>!(engravingDateKey(row)===targetDate&&row.name===name&&row.grade===grade));if(engravingBookPrices.length===before)return;persistEngravingBookPrices();resetEngravingPage();renderEngravingModule();showStatus("已删除刻印书记录："+name+"（"+targetDate+"）",true);}
function renderEngravingList(rows,mode){if(!rows.length)return'<div class="engraving-empty" style="padding:4px 0;text-align:left">暂无</div>';return'<ul>'+rows.map(row=>{const right=mode==="percent"?formatEngravingPercent(row.lowVsPrevAvg):formatEngravingNumber(row.lowest);const cls=mode==="percent"?' class="engraving-pct '+engravingPctClass(row.lowVsPrevAvg)+'"':"";return'<li><span>'+escapeHtml(row.name)+'</span><strong'+cls+'>'+right+'</strong></li>';}).join("")+'</ul>';}
function renderEngravingSummary(){const selectedDate=getSelectedEngravingDate();let rows=enrichEngravingRows();if(selectedDate)rows=rows.filter(row=>engravingDateKey(row)===selectedDate);rows=latestEngravingRowsByBook(rows);const highCore=rows.filter(row=>row.lowest>=100000).sort((a,b)=>b.lowest-a.lowest||a.name.localeCompare(b.name,"zh-CN"));const deep=rows.filter(row=>row.lowVsPrevAvg<=-.08).sort((a,b)=>a.lowVsPrevAvg-b.lowVsPrevAvg);const watch=rows.filter(row=>row.lowVsPrevAvg<=-.05&&row.lowVsPrevAvg>-.08).sort((a,b)=>a.lowVsPrevAvg-b.lowVsPrevAvg);const pump=rows.filter(row=>row.lowVsPrevAvg>=.08).sort((a,b)=>b.lowVsPrevAvg-a.lowVsPrevAvg);document.getElementById("engravingSummary").innerHTML='<div class="engraving-highlight"><h3>高价核心书</h3>'+renderEngravingList(highCore,"price")+'</div><div class="engraving-highlight split-list"><h3>明显低于昨均</h3>'+renderEngravingList(deep,"percent")+'</div><div class="engraving-highlight"><h3>-5% 以下关注</h3>'+renderEngravingList(watch,"percent")+'</div><div class="engraving-highlight"><h3>短线抬价</h3>'+renderEngravingList(pump,"percent")+'</div>';}
function renderEngravingControls(){const search=document.getElementById("engravingSearch");if(search&&search.value!==engravingSearch)search.value=engravingSearch;const dateSelect=document.getElementById("engravingDateFilter"),dates=getEngravingDates(),selectedDate=getSelectedEngravingDate();if(dateSelect){const latestDate=dates[dates.length-1]||"";dateSelect.innerHTML=dates.slice().reverse().map(date=>'<option value="'+escapeHtml(date)+'">'+escapeHtml(date)+(date===latestDate?"（最新）":"")+'</option>').join("");dateSelect.value=selectedDate;dateSelect.disabled=dates.length<2;}const panel=document.getElementById("engravingImportPanel"),toggle=document.getElementById("toggleEngravingImport");if(panel)panel.classList.toggle("open",engravingImportOpen);if(toggle){toggle.classList.toggle("active",engravingImportOpen);toggle.setAttribute("aria-pressed",String(engravingImportOpen));}document.querySelectorAll("[data-engraving-filter]").forEach(btn=>{const active=btn.dataset.engravingFilter===engravingFilter;btn.classList.toggle("active",active);btn.setAttribute("aria-pressed",String(active));});document.querySelectorAll("[data-engraving-sort]").forEach(btn=>{if(!btn.dataset.label)btn.dataset.label=btn.textContent;const active=btn.dataset.engravingSort===engravingSortKey;btn.classList.toggle("active",active);btn.setAttribute("aria-pressed",String(active));btn.textContent=btn.dataset.label+(active?(engravingSortDir>0?" ↑":" ↓"):"");});}
function renderEngravingTable(){

  engravingPage = Math.max(0, Math.min(engravingPage, totalPages - 1));

  html += pageRows.map(row => {

  }).join('');
  for (let i = pageRows.length; i < ENGRAVING_PAGE_SIZE; i++) {
    html += '<tr class="engraving-placeholder" aria-hidden="true"><td><div class="engraving-name"><strong>&nbsp;</strong><span>&nbsp;</span></div></td><td><div class="engraving-historic-low"><strong>&nbsp;</strong><span>&nbsp;</span></div></td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td><span class="engraving-status">&nbsp;</span></td></tr>';

  wrap.innerHTML = html;

const withdrawalAliases={bank:"ccb"};
function roundMoney(value){return Math.round((Number(value)+Number.EPSILON)*100)/100;}
function normalizeWithdrawChannel(channel){const key=withdrawalAliases[channel]||channel;return platformRules.withdrawals[key]?key:"ccb";}
function formatWithdrawRate(rule){return (rule.rate*100).toFixed(1)+"%";}
function formatWithdrawRule(rule){return formatWithdrawRate(rule)+"，最低费 ¥"+rule.minFee+"，封顶 ¥"+rule.maxFee;}
function calculateWithdrawal(netRmb,channel){
  const amount=Number(netRmb),rule=platformRules.withdrawals[normalizeWithdrawChannel(channel)];
  if(!Number.isFinite(amount)||amount<0)return{eligible:false,fee:null,amount:null,reason:"金额无效",rule};
  const fee=roundMoney(Math.min(Math.max(amount*rule.rate,rule.minFee||0),rule.maxFee||Infinity));
  const eligible=amount>fee;
  return{eligible,fee,amount:roundMoney(Math.max(0,amount-fee)),reason:eligible?"":"提现费高于到账金额",rule};
}
function calculateSaleResult(netGold,goldRate,channel=gcWithdrawChannel){
  if(!(goldRate>0)||!(netGold>=0))return null;
  const grossRmb=netGold/goldRate;
  const platformFee=roundMoney(grossRmb*platformRules.saleFeeRate);
  const platformNet=roundMoney(grossRmb-platformFee);
  return{grossRmb,platformFee,platformNet,withdrawal:calculateWithdrawal(platformNet,channel)};
}
function formatWithdrawalDisplay(withdrawal,formatter){
  if(!withdrawal||withdrawal.amount==null)return withdrawal&&withdrawal.reason?withdrawal.reason:"—";

  return withdrawal.eligible?value:value+"（"+withdrawal.reason+"）";
}

// 迁移旧数据：补全日期和稳定标识，保留历史行情。
function migrateGcTxns(arr){
  return (Array.isArray(arr)?arr:[]).map((t,index)=>{
    if(!t||(t.type!=="邮寄交易"&&t.type!=="拍卖交易"))return null;
    const date=normalizeDateToken(t.date)||todayLabel();
    const gold=cleanNum(t.gold),price=cleanNum(t.price);
    const signature=[date,t.type,gold==null?"":gold,price==null?"":price].join("-");
    return{id:t.id||"txn-"+signature+"-"+index,type:t.type,gold,price,date};
  }).filter(Boolean);
}
function mergeGcTxns(existing,incoming){
  const next=migrateGcTxns(incoming||[]);
  if(!next.length)return migrateGcTxns(existing||[]);
  const replacedDates=new Set(next.map(t=>t.date));
  const preserved=migrateGcTxns(existing||[]).filter(t=>!replacedDates.has(t.date));
  const combined=preserved.concat(next);
  const seen=new Set();
  return combined.filter(t=>{
    const key=[t.date,t.type,t.gold,t.price].join("|");
    if(seen.has(key))return false;
    seen.add(key);
    return true;
  });
}

let goldHistory=[];
function buildGoldHistory(){
  const byDate={};
  gcTxns.forEach(t=>{
    if(!t.date||!t.gold||!t.price||t.price<=0) return;
    const key=t.date;
    if(!byDate[key]) byDate[key]={mail:[],auc:[]};
    const arr=t.type==="邮寄交易"?byDate[key].mail:byDate[key].auc;
    arr.push(t.gold/t.price);
  });
  goldHistory=Object.keys(byDate).sort((a,b)=>a.localeCompare(b)).map(date=>{
    const d=byDate[date];
    function mid(arr){
      if(!arr.length) return null;
      const s=arr.slice().sort((a,b)=>a-b);
      return s.length%2===1?s[Math.floor(s.length/2)]:(s[s.length/2-1]+s[s.length/2])/2;
    }
    return {date,mailMid:mid(d.mail),aucMid:mid(d.auc)};
  });
  if(!gcQuoteDate||!goldHistory.some(row=>row.date===gcQuoteDate)){
    gcQuoteDate=goldHistory.length?goldHistory[goldHistory.length-1].date:null;
  }
}
function getGoldRateInfo(date,type){
  // 只回退到目标日期以前的最近报价，绝不使用未来行情。
  const target=normalizeDateToken(date)||date;
  const t=type==="邮寄交易"?"mailMid":"aucMid";
  let best=null;
  for(const h of goldHistory){
    if(h[t]==null) continue;
    if(h.date===target)return{rate:h[t],date:h.date,exact:true};
    if(h.date<=target)best=h;
  }
  return best?{rate:best[t],date:best.date,exact:false}:null;
}
function getGoldRate(date,type){const info=getGoldRateInfo(date,type);return info?info.rate:null;}
function goldRateToCost(rate){return rate>0?10000/rate:null;}
function goldPriceChangePercent(firstRate,lastRate){
  const firstCost=goldRateToCost(firstRate),lastCost=goldRateToCost(lastRate);
  return firstCost&&lastCost?(lastCost-firstCost)/firstCost*100:0;
}

function enhanceGcalcSelect(select,settings={}){
  if(!select) return;

  }

  if(!mount) return;
  const old=mount.querySelector(`.gcalc-picker[data-for="${select.id}"]`);

  search.placeholder=settings.placeholder||"搜索";
  const list=document.createElement("div");
  list.className="gcalc-picker-options";
  panel.append(search,list);
  picker.append(btn,panel);
  function optionText(opt){return opt?opt.dataset.shortLabel||opt.textContent||"请选择":"请选择";}
  function updateButton(){
    const selected=select.selectedOptions[0]||select.options[0];
    btn.textContent=optionText(selected);
    btn.title=selected?selected.textContent:"";
  }
  function renderList(){
    const q=search.value.trim().toLowerCase();
    const options=Array.from(select.options).filter(opt=>{
      const hay=opt.textContent+" "+(opt.dataset.keywords||"");
      return !q||window.LostarkPinyinSearch?.match(hay,q)||hay.toLowerCase().includes(q);
    });
    list.innerHTML="";
    if(!options.length){
      const empty=document.createElement("div");
      empty.className="gcalc-picker-empty";
      empty.textContent=settings.emptyText||"没有匹配项";
      list.append(empty);
      return;
    }
    options.forEach(opt=>{
      const item=document.createElement("button");
      item.type="button";
      item.className="gcalc-picker-option"+(opt.value===select.value?" active":"");
      item.innerHTML=escapeHtml(opt.dataset.main||opt.textContent)+(opt.dataset.sub?`<span class="muted">${escapeHtml(opt.dataset.sub)}</span>`:"");
      item.addEventListener("click",e=>{
        e.preventDefault();
        e.stopPropagation();
        select.value=opt.value;
        updateButton();
        picker.classList.remove("open");
        select.dispatchEvent(new Event("change",{bubbles:true}));
      });
      list.append(item);
    });
  }
  btn.addEventListener("click",e=>{
    e.preventDefault();
    e.stopPropagation();
    document.querySelectorAll(".gcalc-picker.open").forEach(el=>{if(el!==picker)el.classList.remove("open");});
    picker.classList.toggle("open");
    if(picker.classList.contains("open")){
      search.value="";
      renderList();
      setTimeout(()=>search.focus(),0);
    }
  });
  picker.addEventListener("click",e=>e.stopPropagation());
  search.addEventListener("input",e=>{e.stopPropagation();renderList();});
  search.addEventListener("keydown",e=>{if(e.key==="Escape"){picker.classList.remove("open");btn.focus();}});
  updateButton();
  renderList();
  if(field) mount.append(picker);
  else if(label&&label.parentElement===mount) label.after(picker);
  else mount.append(picker);
}

function getGcStats(date=gcQuoteDate){
  const quoteDate=normalizeDateToken(date)||gcQuoteDate||(goldHistory.length?goldHistory[goldHistory.length-1].date:null);
  function calcStat(arr){
    if(!arr.length) return null;
    const rates=arr.map(t=>t.gold/t.price).sort((a,b)=>a-b);
    const n=rates.length;
    const mid=n%2===1?rates[Math.floor(n/2)]:(rates[n/2-1]+rates[n/2])/2;
    const dates=arr.map(t=>t.date).filter(Boolean).sort();
    const dateRange=dates.length?dates[0]+(dates.length>1?" ~ "+dates[dates.length-1]:""):"";
    return{n,min:rates[0],max:rates[n-1],mid,dateRange,
      per10k:10000/mid,
      per10kNet:10000/mid*(1-0.03)
    };
  }
  const quoteRows=gcTxns.filter(t=>t.date===quoteDate&&t.gold>0&&t.price>0);
  return{quoteDate,mail:calcStat(quoteRows.filter(t=>t.type==="邮寄交易")),auc:calcStat(quoteRows.filter(t=>t.type==="拍卖交易"))};
}

// ── 金价趋势迷你图 ──────────────────────────────────────
function renderGoldMiniChart(){
  const w=280,h=36,pad=2;
  const pts=goldHistory.filter(d=>d.mailMid!=null);
  if(pts.length<2) return '';
  const vals=pts.map(d=>goldRateToCost(d.mailMid));
  const min=Math.min(...vals),max=Math.max(...vals),range=max-min||1;
  const x=i=>pad+i*(w-2*pad)/(pts.length-1);
  const y=v=>h-pad-(v-min)/range*(h-2*pad);
  let path=pts.map((d,i)=>(i?'L':'M')+x(i).toFixed(1)+','+y(goldRateToCost(d.mailMid)).toFixed(1)).join(' ');
  const last=pts[pts.length-1];
  const chg=pts.length>=2?goldPriceChangePercent(pts[0].mailMid,last.mailMid):0;
  const chgClr=chg>0?'#dc2626':chg<0?'#059669':'#6b7280';
  return `<div style="margin-top:6px;display:flex;align-items:center;gap:6px">
    <span style="font-size:10px;color:#6b7280;white-space:nowrap">金价趋势</span>
    <svg viewBox="0 0 ${w} ${h}" style="width:${w}px;height:${h}px;flex:1"><path d="${path}" fill="none" stroke="#6366f1" stroke-width="1.5"/><circle cx="${x(pts.length-1)}" cy="${y(goldRateToCost(last.mailMid))}" r="2.5" fill="#6366f1"/></svg>
    <span style="font-size:10px;color:${chgClr};font-weight:700;white-space:nowrap">${chg>=0?'+':''}${chg.toFixed(1)}%</span>
    </div>`;
}

function getGcConversionSource(stats=getGcStats()){
  const manualRate=Number(document.getElementById("gcBuyRate")?.value)||0;
  if(manualRate>0){
    return{type:"手动买金比例",date:stats.quoteDate||gcQuoteDate||"手动",rate:manualRate,selected:true,kind:""};
  }
  const select=document.getElementById("gcBuyRateSource");
  const selected=getGcBuyRateSourceByKey(select&&select.value!==""?select.value:gcBuyRateSourceKey);
  if(selected&&selected.date===stats.quoteDate&&selected.rate>0){
    return{type:selected.type,date:selected.date,rate:selected.rate,selected:true,kind:selected.kind};
  }
  const fallback=stats.mail?{type:"邮寄交易",stat:stats.mail}:stats.auc?{type:"拍卖交易",stat:stats.auc}:null;
  return fallback?{type:fallback.type,date:stats.quoteDate,rate:fallback.stat.mid,selected:false,kind:"中间价"}:null;
}
function formatGcConversionSource(source){
  return source?`${source.type}${source.kind||(!source.selected?"中间价":"")} · ${source.date} · ${source.rate.toFixed(1)} 金/¥`:"—";
}
function formatGcConversionSourceShort(source){
  return source?`${source.type}${source.kind||(!source.selected?"中间价":"")}`:"暂无金价";
}
function formatGcConversionSourceRatio(source){
  return source?`${source.date||"—"} · ${source.rate.toFixed(1)} 金/¥`:"暂无金价比例";
}
function formatGcConversionSourceFull(source){
  return source?`${formatGcConversionSourceShort(source)} · ${formatGcConversionSourceRatio(source)}`:"暂无金价比例";
}

function renderGcBuyResults(){
  const el=document.getElementById("gcBuyResults");
  if(!el) return;
  const buyGold =Number(document.getElementById("gcBuyGold")?.value)||0;
  const payRmb  =Number(document.getElementById("gcPayRmb")?.value)||0;
  const gemPrice=Number(document.getElementById("gcGemPrice")?.value)||0;
  const gemQty  =Number(document.getElementById("gcGemQty")?.value)||0;

  const totalGem  =gemPrice*gemQty;
  const serviceFee=lookupGameFee(totalGem);   // 卖宝石时产生的手续费
  const netGemGold=totalGem-serviceFee;       // 卖出到账金
  // 买金币邮寄会产生手续费
  const buyFee    =lookupGameFee(buyGold);
  const actualGold=buyGold-buyFee;
  const surfaceRate=payRmb>0?buyGold/payRmb:0;
  const actualRate =payRmb>0?actualGold/payRmb:0;
  const actualCost10k=actualGold>0?payRmb/actualGold*10000:0;

  const{quoteDate,mail,auc}=getGcStats();
  const mailMid=mail?mail.mid:null;
  const aucMid =auc ?auc.mid :null;
  const mailSale=mailMid&&actualGold>0?calculateSaleResult(actualGold,mailMid):null;
  const aucSale =aucMid &&actualGold>0?calculateSaleResult(actualGold,aucMid):null;

  function kpi(label,val,sub){
    return`<div class="gcalc-buy-kpi"><div class="gcalc-buy-label">${label}</div>`
      +`<div class="gcalc-buy-v">${val}</div>`
      +(sub?`<div class="gcalc-buy-sub">${sub}</div>`:"")
      +`</div>`;
  }
  const fmt =n=>n==null?"—":Math.round(n).toLocaleString()+" 金";
  const fmtr=n=>n==null?"—":"¥"+n.toFixed(2);
  const fmtg=n=>n==null?"—":n.toFixed(1)+" 金/¥";
  const fmtWd=result=>!result?"—":formatWithdrawalDisplay(result.withdrawal,fmtr);
  const feeLine=result=>!result?"":`平台后 ${fmtr(result.platformNet)} / 提现费 ${result.withdrawal.fee==null?"—":fmtr(result.withdrawal.fee)} / 提现后 ${fmtWd(result)}`;

  el.innerHTML='<div class="gcalc-buy-kpis">'
    +kpi("宝石总金币",fmt(totalGem),"卖出服务费 "+Math.round(serviceFee).toLocaleString()+" 金 / 到账 "+Math.round(netGemGold).toLocaleString()+" 金")
    +kpi("买金实际到账",fmt(actualGold),"邮寄手续费 "+Math.round(buyFee).toLocaleString()+" 金 / 表面金价 "+fmtg(surfaceRate))
    +kpi("每万金买入成本","¥"+actualCost10k.toFixed(2),"实际金价 "+fmtg(actualRate))
    +kpi("邮寄卖出回收",mailSale?fmtr(mailSale.grossRmb):"—",(quoteDate?"报价日 "+quoteDate+" / ":"")+feeLine(mailSale))
    +kpi("拍卖卖出回收",aucSale?fmtr(aucSale.grossRmb):"—",(quoteDate?"报价日 "+quoteDate+" / ":"")+feeLine(aucSale))
    +(()=>{
      const md=mailSale&&mailSale.withdrawal.amount!=null&&payRmb?mailSale.withdrawal.amount-payRmb:null;
      const ad=aucSale&&aucSale.withdrawal.amount!=null&&payRmb?aucSale.withdrawal.amount-payRmb:null;
      const fmt1=d=>d==null?"—":(d>=0?"✅ +¥":"❌ -¥")+Math.abs(d).toFixed(2);
      const withAdvice=(text,sale)=>text+(sale&&!sale.withdrawal.eligible?"（不建议提现）":"");
      const main=md!=null?withAdvice(fmt1(md),mailSale):"需填买金数据";
      const sub=ad!=null?"拍卖卖出: "+withAdvice(fmt1(ad),aucSale):"";
      return kpi("提现后 vs 买入成本",main,"邮寄卖出"+(sub?";  "+sub:""));
    })()
    +"</div>";
}

const synthRecipes=[
  {target:"8级",paths:[{from:"5级",qty:27},{from:"6级",qty:9},{from:"7级",qty:3}]},
  {target:"9级",paths:[{from:"5级",qty:81},{from:"6级",qty:27},{from:"7级",qty:9},{from:"8级",qty:3}]},
  {target:"10级",paths:[{from:"5级",qty:243},{from:"6级",qty:81},{from:"7级",qty:27},{from:"8级",qty:9},{from:"9级",qty:3}]},
];
function renderGcSynthTable(){
  const el=document.getElementById("gcSynthTable");
  if(!el) return;
  const stats=getGcStats();
  const source=getGcConversionSource(stats);
  const gemQuoteDate=getGcGemQuoteDateLabel();
  const dateLabel=document.getElementById("gcSynthQuoteDate");
  if(dateLabel)dateLabel.textContent=`宝石报价日 ${gemQuoteDate} / 按 ${formatGcConversionSourceFull(source)} 折算`;
  const rate=source?source.rate:null;
  if(!rate){
    el.innerHTML='<p style="color:#9ca3af;font-size:12px;text-align:center;margin:8px 0">需要行情数据才能计算合成成本</p>';
    return;
  }
  const fp2=n=>n==null?"—":"¥"+n.toFixed(2);
  const sourceName=source.type.replace("交易","");
  const sourceBg=source.type==="邮寄交易"?"#eff6ff":"#fffbeb";

  let h='<table class="gcalc-atbl"><thead><tr>'
    +'<th>目标</th><th>起始材料</th><th>数量</th><th>材料总金</th><th>直购金币</th>'
    +`<th class="sp" style="background:${sourceBg}">${sourceName} 合成成本¥</th><th style="background:${sourceBg}">直购价¥</th><th style="background:${sourceBg}">差价¥</th>`
    +'</tr></thead><tbody>';

  synthRecipes.forEach(r=>{
    const targetLast=getGcQuotedGemValue(r.target);
    const targetPrice=targetLast&&targetLast.raw!=null?targetLast.raw:null;
    const rowCount=r.paths.length;
    r.paths.forEach((path,pi)=>{
      const last=getGcQuotedGemValue(path.from);
      const p=last&&last.raw!=null?last.raw:0;
      const totalMatGold=p*path.qty;

      const synthCost=totalMatGold/rate;
      const directCost=targetPrice!=null?targetPrice/rate:null;
      const diff=directCost!=null?directCost-synthCost:null;
      const cls=diff==null?"":diff>=0?"gd":"bd";
      const conversionCols=`<td class="sp">${fp2(synthCost)}</td><td>${fp2(directCost)}</td><td class="${cls}">${diff==null?"—":(diff>=0?"节省 ":"多花 ")+fp2(Math.abs(diff))}</td>`;
      const targetCell=pi===0?`<td class="cl" rowspan="${rowCount}">${r.target}</td>`:"";
      const directGoldCell=pi===0
        ?`<td rowspan="${rowCount}" style="text-align:right">${targetPrice!=null?Math.round(targetPrice).toLocaleString()+" 金":"—"}</td>`
        :"";
      h+=`<tr>${targetCell}<td style="text-align:center">${path.from}</td><td style="text-align:center">×${path.qty}</td><td>${Math.round(totalMatGold).toLocaleString()} 金</td>${directGoldCell}${conversionCols}</tr>`;
    });
  });
  h+='</tbody></table>';
  h+=`<div class="gcalc-legend"><span>参考报价日期：${source.date||"—"}（金价折算）</span><span>金价来源：${formatGcConversionSource(source)}</span><span>宝石报价日：${gemQuoteDate}</span><span>差价 = 直购价 − 合成成本；绿色=合成更划算，红色=直购更划算</span></div>`;
  el.innerHTML=h;
}

// ── 快速导入解析 ──────────────────────────────────────
function parseGcTxnImport(text){
  const lines=text.trim().split(/\r?\n/).filter(l=>l.trim());
  const result=[];
  for(const line of lines){
    let type=null;
    let rest=line;
    // 提取日期（支持 2026/5/20 或 5/20 格式）
    const dateMatch=rest.match(/([0-9]{4}[/.年-])?[0-9]{1,2}[/.月-][0-9]{1,2}日?/);
    let date=dateMatch?normalizeDateToken(dateMatch[0]):null;
    if(date) rest=rest.replace(dateMatch[0],'');
    if(line.includes('邮寄')){type='邮寄交易';rest=rest.replace(/邮寄交易?/,'');}
    else if(line.includes('拍卖')){type='拍卖交易';rest=rest.replace(/拍卖交易?/,'');}
    // 用正则提取所有数字 token（支持千分位逗号和小数），不依赖分隔符
    const nums=(rest.match(/[\d,]+(?:\.\d+)?/g)||[]).map(p=>cleanNum(p)).filter(v=>v!=null&&v>0);
    if(nums.length<2) continue;
    result.push({type:type||null,gold:nums[0],price:nums[1],date:date||todayLabel()});
  }
  const noType=result.length&&result.every(r=>r.type===null);
  if(noType){
    const fallbacks=['邮寄交易','邮寄交易','拍卖交易','拍卖交易'];
    result.forEach((r,i)=>{r.type=fallbacks[i]||'邮寄交易';});
  }
  return result;
}

document.getElementById("gcTxnImportApply")?.addEventListener("click",()=>{
  const text=document.getElementById("gcTxnImportText").value;
  const status=document.getElementById("gcTxnImportStatus");
  try{
    const rows=parseGcTxnImport(text);
    if(!rows.length){status.textContent="未识别到有效行，请检查格式";status.style.color="#dc2626";return;}
    const importedDates=new Set(rows.map(t=>normalizeDateToken(t.date)||t.date));
    gcTxns=mergeGcTxns(gcTxns,rows);
    markDataImported("gold");
    saveGcTxns();
    const latestImportedDate=[...importedDates].sort((a,b)=>a.localeCompare(b)).pop();

    saveDashboardPreferences();
    document.getElementById("gcTxnImportText").value="";
    document.getElementById("gcTxnImportBox").style.display="none";

    status.textContent="已更新 "+importedDates.size+" 日 / "+importedCount+" 条行情记录";
    status.style.color="#059669";
    showStatus("已覆盖更新 "+importedDates.size+" 个日期的金价行情（"+importedCount+" 条）。",true);
  }catch(err){
    status.textContent="导入失败："+err.message;status.style.color="#dc2626";

function embeddedDataBounds(srcText){
  const startTag='<'+'script id="EMBEDDED_DATA" type="application/json">';
  const endTag='</'+'script>';
  const start=srcText.lastIndexOf(startTag);
  if(start===-1){throw new Error("未找到 EMBEDDED_DATA 标签，请确认选择了正确的文件");}
  const bodyStart=start+startTag.length;
  const end=srcText.indexOf(endTag,bodyStart);
  if(end===-1){throw new Error("EMBEDDED_DATA 标签未正确关闭");}
  return{bodyStart,end};
}
function buildEmbeddedHtml(stateJson,sourceHtml){
  const src=sourceHtml||("<!DOCTYPE html>\n"+document.documentElement.outerHTML);
  const bounds=embeddedDataBounds(src);
  return src.slice(0,bounds.bodyStart)+stateJson+src.slice(bounds.end);
}
function completeHtmlFileName(){
  const d=new Date(),pad=n=>String(n).padStart(2,"0");
  return "宝石价格指数仪表盘-"+d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+"-"+pad(d.getHours())+pad(d.getMinutes())+".html";
}
function markCompleteFileSaved(message){
  const sl=document.getElementById("statusline");
  hasUnsavedChanges=false;
  if(sl){sl.classList.remove("unsaved");sl.textContent=message;}
}
function downloadHtmlFile(html,filename){
  const blob=new Blob([html],{type:"text/html;charset=utf-8"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
function prepareCompleteFileHtml(){
  saveDashboardPreferences();
  const stateJson=JSON.stringify(buildDashboardState());
  const emb=document.getElementById("EMBEDDED_DATA");
  if(emb)emb.textContent=stateJson;
  return buildEmbeddedHtml(stateJson);
}
async function saveToFile(){
  const sl=document.getElementById("statusline");
  try{
    const html=prepareCompleteFileHtml();
    const filename=completeHtmlFileName();
    downloadHtmlFile(html,filename);
    markCompleteFileSaved("完整文件已下载："+filename+"（含 "+rawRows.length+" 日宝石、"+gcTxns.length+" 条金价和 "+engravingBookPrices.length+" 本刻印书记录）");
  }catch(e){
    if(sl) sl.textContent="保存失败："+e.message;
  }
}
async function overwriteSourceFile(){
  const sl=document.getElementById("statusline");
  try{
    if(!window.showOpenFilePicker){throw new Error("当前浏览器不支持覆盖保存，请使用“保存完整文件”下载新版 HTML");}
    saveDashboardPreferences();
    const stateJson=JSON.stringify(buildDashboardState());
    const emb=document.getElementById("EMBEDDED_DATA");
    if(emb)emb.textContent=stateJson;
    const [fh]=await window.showOpenFilePicker({types:[{description:"HTML文件",accept:{"text/html":[".html"]}}]});
    const srcText=await(await fh.getFile()).text();
    const updated=buildEmbeddedHtml(stateJson,srcText);
    if(await fh.requestPermission({mode:"readwrite"})!=="granted"){throw new Error("需要写入权限才能保存");}
    const w=await fh.createWritable();await w.write(updated);await w.close();
    markCompleteFileSaved("已覆盖原文件（"+rawRows.length+" 日宝石 / "+gcTxns.length+" 条金价 / "+engravingBookPrices.length+" 本刻印书）");
  }catch(e){
    if(e.name==="AbortError") return;
    if(sl) sl.textContent="覆盖保存失败："+e.message;
  }
}

const VIDEO_EXPORT_ENDPOINT="http://127.0.0.1:17385/render";
let videoExportProgressTimer=null,videoExportProgress=0;
function setVideoExportStatus(message,progress=null,state=""){
  const top=document.getElementById("videoExportStatus"),text=document.getElementById("videoExportText"),bar=document.getElementById("videoExportProgressBar"),sl=document.getElementById("statusline");
  if(text)text.textContent=message;else if(top)top.textContent=message;
  if(top){top.classList.toggle("active",progress!==null);top.dataset.state=state||"";}
  if(bar&&progress!==null)bar.style.width=Math.max(0,Math.min(100,progress))+"%";
  if(sl)sl.textContent=message+(hasUnsavedChanges?"；有尚未保存到文件的修改":"");
}
function stopVideoExportProgress(){
  if(videoExportProgressTimer){clearInterval(videoExportProgressTimer);videoExportProgressTimer=null;}
}
function startVideoExportProgress(){
  stopVideoExportProgress();
  videoExportProgress=12;
  setVideoExportStatus("正在提交当前数据...",videoExportProgress,"active");
  videoExportProgressTimer=setInterval(()=>{
    videoExportProgress=Math.min(92,videoExportProgress+(videoExportProgress<45?7:videoExportProgress<75?4:1.5));
    setVideoExportStatus(videoExportProgress<35?"正在提交当前数据...":"正在调用 Remotion 渲染视频，请保持服务窗口打开...",videoExportProgress,"active");
  },900);
}
async function readVideoExportResponse(response){
  const text=await response.text();
  try{return JSON.parse(text||"{}");}catch(e){return{ok:false,error:text||response.statusText};}
}
async function exportVideo(format="16x9"){
  const btn=document.getElementById(format==="9x16"?"exportMobileVideoBtn":"exportVideoBtn"),oldText=btn.textContent;
  try{
    btn.disabled=true;
    btn.textContent="输出中...";
    startVideoExportProgress();
    saveDashboardPreferences();
    const state=buildDashboardState();
    state.publishedAt=latestImportTimestamp()||state.publishedAt;
    state.settings=Object.assign({},state.settings||{},{publishedAt:state.publishedAt||null,importTimestamps:Object.assign({},importTimestamps)});
    const response=await fetch(VIDEO_EXPORT_ENDPOINT,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({format,state})});
    const result=await readVideoExportResponse(response);
    if(!response.ok||!result.ok)throw new Error(result.error||("视频导出失败："+response.status));
    const out=result.outputPath||"renders 目录";
    const script=result.scriptPath?("；口播稿："+result.scriptPath):"";
    stopVideoExportProgress();
    setVideoExportStatus("视频已输出："+out+script,100,"done");
  }catch(e){
    stopVideoExportProgress();
    const message=e instanceof TypeError?"Remotion 视频导出服务未启动，请先运行“启动宝石视频导出服务.bat”。":"视频导出失败："+e.message;
    setVideoExportStatus(message,100,"error");
  }finally{
    btn.disabled=false;
    btn.textContent=oldText;
  }
}
document.getElementById("exportVideoBtn")?.addEventListener("click",()=>exportVideo("16x9"));
document.getElementById("exportMobileVideoBtn")?.addEventListener("click",()=>exportVideo("9x16"));

    }
  }catch(e){
    sl.textContent="导入备份失败："+e.message;
  }finally{
    this.value="";
  }
});

<script type="module">
try{
  const readEmbeddedDashboardState=()=>{
    try{
      const text=document.getElementById("EMBEDDED_DATA")?.textContent||"";
      return text?JSON.parse(text):null;
    }catch(e){
      return null;
    }
  };
  let payload=null;
  if(location.protocol==="file:"){
    payload=readEmbeddedDashboardState();
    if(!(payload&&payload.version===DASHBOARD_STATE_VERSION&&Array.isArray(payload.gemRows)&&Array.isArray(payload.goldTxns))){
      payload=window.LOSTARK_PUBLIC_DASHBOARD_STATE||null;
    }
  }else{
    try{
      const response=await fetch("../data/dashboard-state.json?v="+Date.now(),{cache:"no-store"});
      if(!response.ok)throw new Error("HTTP "+response.status);
      payload=await response.json();
    }catch(fetchError){
      throw new Error("dashboard-state.json 加载失败："+fetchError.message);
    }
  }
  if(payload&&payload.version===DASHBOARD_STATE_VERSION&&Array.isArray(payload.gemRows)&&Array.isArray(payload.goldTxns)){
    embeddedDashboardState=payload;
    setDashboardLoadState("ready");
    applyDashboardState(payload);
  }else{
    throw new Error("dashboard-state.json 格式不受支持");
  }
}catch(e){
  console.warn("仪表盘数据加载失败：",e);
  data=[];
  rawRows=[];
  gcTxns=[];
  engravingBookPrices=[];
  renderDataPreview();
  setDashboardLoadState("error",e.message||"dashboard-state.json 加载失败");
  showStatus(e.message||"dashboard-state.json 加载失败");
}
</script>
