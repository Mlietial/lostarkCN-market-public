<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>材料价格趋势</title>
  <style>
    :root{--bg:#f6f8fb;--text:#111827;--muted:#64748b;--line:#e5e7eb;--panel:#fff;--shadow:0 14px 34px rgba(15,23,42,.08);--red:#dc2626;--green:#059669}
    *{box-sizing:border-box}
    body{margin:0;font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;color:var(--text);background:linear-gradient(180deg,#f8fafc 0%,var(--bg) 100%)}
    .app{max-width:1280px;margin:0 auto;padding:24px 22px 36px}
    .topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;margin-bottom:18px}
    h1{margin:0;font-size:30px;line-height:1.15;font-weight:900}
    .subtitle{margin-top:7px;color:var(--muted);font-size:14px}
    .actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    .btn{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);border-radius:999px;background:#fff;color:#111827;padding:9px 14px;font-size:13px;font-weight:850;text-decoration:none;cursor:pointer;box-shadow:none}
    .btn.primary{border-color:#111827;background:#111827;color:#fff;box-shadow:0 8px 20px rgba(17,24,39,.12)}
    .grid{display:grid;gap:16px}
    .kpis{grid-template-columns:repeat(4,minmax(0,1fr));margin-bottom:16px}
    .card{background:rgba(255,255,255,.94);border:1px solid rgba(229,231,235,.95);border-radius:12px;box-shadow:var(--shadow)}
    .kpi{padding:15px 15px 14px;min-height:118px}
    .kpi span{display:block;color:var(--muted);font-size:12px;font-weight:850;margin-bottom:8px}
    .kpi b{display:block;font-size:27px;line-height:1.1;font-weight:950}
    .kpi em{display:block;margin-top:8px;color:var(--muted);font-size:12px;line-height:1.35;font-style:normal}
    .panel{padding:18px 20px 20px;margin-bottom:16px;overflow:hidden}
    .panel-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:12px}
    .panel h2{margin:0 0 8px;font-size:20px;line-height:1.2;font-weight:900}
    .tools{display:flex;align-items:center;justify-content:flex-end;gap:8px;flex-wrap:wrap}
    .select,.search{border:1px solid var(--line);border-radius:999px;background:#fff;color:#111827;padding:8px 12px;font-size:13px;font-weight:750;outline:0}
    .search{width:210px}
    .legend{display:flex;align-items:center;gap:14px;flex-wrap:wrap;color:#374151;font-size:13px}
    .legend span{display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
    .dot{width:10px;height:10px;border-radius:50%;background:var(--c);display:inline-block}
    .chart-wrap{height:430px;width:100%;position:relative;overflow:hidden}
    .chart-wrap svg{display:block;width:100%;height:100%}
    .gridline{stroke:#edf1f6;stroke-width:1}
    .axis,.tick{fill:#64748b;font-size:11px}
    .series{fill:none;stroke-width:3.5;stroke-linecap:round;stroke-linejoin:round}
    .marker{stroke:#fff;stroke-width:2}
    .tooltip{position:absolute;z-index:10;display:none;pointer-events:none;background:rgba(17,24,39,.92);color:#fff;border-radius:10px;padding:7px 9px;font-size:12px;line-height:1.45;box-shadow:0 10px 24px rgba(15,23,42,.22);white-space:nowrap}
    .tooltip.show{display:block}
    .split{grid-template-columns:minmax(0,1fr) 360px;align-items:start}
    .table-scroll{overflow:auto;max-height:520px;border:1px solid var(--line);border-radius:10px}
    table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px}
    th,td{padding:9px 10px;border-bottom:1px solid #edf1f6;text-align:right;white-space:nowrap}
    th:first-child,td:first-child{text-align:left}
    th{position:sticky;top:0;background:#f9fafb;color:#374151;font-weight:900;z-index:1}
    tr:last-child td{border-bottom:0}
    .up{color:var(--green);font-weight:850}
    .down{color:var(--red);font-weight:850}
    .muted{color:var(--muted)}
    .error{padding:26px;color:#991b1b;background:#fff7f7;border:1px solid #fecaca;border-radius:12px}
    @media(max-width:900px){.topbar,.panel-head{display:block}.actions,.tools{justify-content:flex-start;margin-top:12px}.kpis,.split{grid-template-columns:1fr}.chart-wrap{height:380px}h1{font-size:26px}}
  </style>
</head>
<body>
  <main class="app">
    <section class="topbar">
      <div>
        <h1>材料价格趋势</h1>
        <div id="subtitle" class="subtitle">读取材料价格历史中...</div>
      </div>
      <div class="actions">
        <a class="btn" href="../index.html">返回首页</a>
        <a class="btn" href="./gift-pack-value.html">礼包分析页</a>
        <a class="btn" href="./gem-dashboard.html">宝石仪表盘</a>
      </div>
    </section>

    <section id="kpis" class="grid kpis"></section>

    <section class="card panel">
      <div class="panel-head">
        <div>
          <h2>多材料价格走势</h2>
          <div id="legend" class="legend"></div>
        </div>
        <div class="tools">
          <input id="search" class="search" type="search" placeholder="筛选材料">
          <select id="range" class="select">
            <option value="all">全部</option>
            <option value="30">近30天</option>
            <option value="14">近14天</option>
            <option value="7">近7天</option>
          </select>
        </div>
      </div>
      <div id="chart" class="chart-wrap" aria-label="材料价格趋势图"></div>
    </section>

    <section class="grid split">
      <section class="card panel">
        <div class="panel-head">
          <div>
            <h2>最新材料价格</h2>
            <div class="subtitle">按最近一次记录计算涨跌</div>
          </div>
        </div>
        <div class="table-scroll">
          <table>
            <thead><tr><th>材料</th><th>最新价</th><th>较前次</th><th>记录数</th></tr></thead>
            <tbody id="latestRows"></tbody>
          </table>
        </div>
      </section>

      <section class="card panel">
        <h2>记录日期</h2>
        <div class="table-scroll">
          <table>
            <thead><tr><th>日期</th><th>材料数</th></tr></thead>
            <tbody id="dateRows"></tbody>
          </table>
        </div>
      </section>
    </section>
  </main>

  <script src="../data/material-price-history.js"></script>
  <script>
    const history = window.LOSTARK_PUBLIC_MATERIAL_PRICE_HISTORY;
    const colors = ["#2563eb","#d97706","#059669","#dc2626","#7c3aed","#0891b2","#ca8a04","#db2777","#475569","#16a34a"];
    const state = { range: "all", search: "" };

    const fmt = (n) => n == null ? "—" : Math.round(n).toLocaleString("zh-CN");
    const pct = (n) => {
      if (n == null || !Number.isFinite(n)) return "—";
      const sign = n > 0 ? "+" : "";
      return `${sign}${n.toFixed(2)}%`;
    };
    const shortDate = (s) => String(s || "").replace(/^[0-9]{4}-/, "");

    function getRows() {
      if (!history || !Array.isArray(history.rows)) return [];
      const rows = history.rows.slice().sort((a, b) => String(a.date).localeCompare(String(b.date)));
      if (state.range === "all") return rows;
      return rows.slice(-Number(state.range));
    }

    function getItems() {
      const q = state.search.trim();
      const items = (history.items || []).filter((name) => !q || name.includes(q));
      return items.slice(0, 9);
    }

    function pointsFor(item, rows = getRows()) {
      return rows.map((row, index) => {
        const entry = row.values && row.values[item];
        return { index, date: row.date, value: entry ? Number(entry.value) : null };
      }).filter((point) => point.value != null && Number.isFinite(point.value));
    }

    function latestInfo(item) {
      const pts = pointsFor(item, history.rows || []);
      const latest = pts[pts.length - 1] || null;
      const prev = pts[pts.length - 2] || null;
      const change = latest && prev && prev.value ? (latest.value - prev.value) / prev.value * 100 : null;
      return { latest, prev, change, count: pts.length };
    }

    function renderKpis() {
      const items = history.items || [];
      const infos = items.map((item) => ({ item, ...latestInfo(item) })).filter((info) => info.latest);
      const rising = infos.filter((info) => info.change > 0).length;
      const falling = infos.filter((info) => info.change < 0).length;
      const biggest = infos.filter((info) => info.change != null).sort((a, b) => Math.abs(b.change) - Math.abs(a.change))[0];
      const lastDate = (history.rows || []).slice(-1)[0]?.date || "—";
      document.getElementById("kpis").innerHTML = [
        ["最新日期", lastDate, `${items.length} 个材料`],
        ["上涨材料", rising, "较前一次记录"],
        ["下跌材料", falling, "较前一次记录"],
        ["最大波动", biggest ? biggest.item : "—", biggest ? pct(biggest.change) : "—"]
      ].map(([label, value, note]) => `<article class="card kpi"><span>${label}</span><b>${value}</b><em>${note}</em></article>`).join("");
    }

    function renderChart() {
      const el = document.getElementById("chart");
      const rows = getRows();
      const items = getItems();
      if (!rows.length || !items.length) {
        el.innerHTML = '<div class="error">没有可显示的材料趋势数据。</div>';
        return;
      }

      const allValues = items.flatMap((item) => pointsFor(item, rows).map((p) => p.value));
      const min = Math.min(...allValues);
      const max = Math.max(...allValues);
      const pad = Math.max(1, (max - min) * 0.12);
      const yMin = min - pad;
      const yMax = max + pad;
      const w = 1100, h = 430, m = { l: 72, r: 28, t: 24, b: 42 };
      const x = (i) => m.l + i * (w - m.l - m.r) / Math.max(1, rows.length - 1);
      const y = (v) => h - m.b - (v - yMin) / Math.max(1, yMax - yMin) * (h - m.t - m.b);
      const ticks = rows.map((_, i) => i).filter((i) => i === 0 || i === rows.length - 1 || i % Math.max(1, Math.ceil(rows.length / 8)) === 0);
      let svg = `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">`;
      for (let i = 0; i < 5; i++) {
        const gy = m.t + i * (h - m.t - m.b) / 4;
        const value = yMax - i * (yMax - yMin) / 4;
        svg += `<line class="gridline" x1="${m.l}" y1="${gy}" x2="${w - m.r}" y2="${gy}"/><text class="tick" x="${m.l - 10}" y="${gy + 4}" text-anchor="end">${fmt(value)}</text>`;
      }
      ticks.forEach((i) => {
        svg += `<line class="gridline" x1="${x(i)}" y1="${m.t}" x2="${x(i)}" y2="${h - m.b}" opacity=".45"/><text class="tick" x="${x(i)}" y="${h - 14}" text-anchor="middle">${shortDate(rows[i].date)}</text>`;
      });
      items.forEach((item, itemIndex) => {
        const pts = pointsFor(item, rows);
        const c = colors[itemIndex % colors.length];
        const path = pts.map((p, i) => `${i ? "L" : "M"}${x(p.index).toFixed(1)},${y(p.value).toFixed(1)}`).join(" ");
        svg += `<path class="series" d="${path}" stroke="${c}"/>`;
        pts.forEach((p) => {
          const tip = `${p.date}　${item}：${fmt(p.value)}`;
          svg += `<circle class="marker" cx="${x(p.index)}" cy="${y(p.value)}" r="4.5" fill="${c}" data-tip="${tip}"/>`;
        });
      });
      svg += `<text class="axis" x="${m.l}" y="14">金币价格</text></svg><div class="tooltip"></div>`;
      el.innerHTML = svg;
      el.querySelectorAll("[data-tip]").forEach((node) => {
        node.addEventListener("mousemove", (event) => showTooltip(el, event, node.dataset.tip));
        node.addEventListener("mouseleave", () => hideTooltip(el));
      });
      document.getElementById("legend").innerHTML = items.map((item, i) => `<span><i class="dot" style="--c:${colors[i % colors.length]}"></i>${item}</span>`).join("");
    }

    function showTooltip(container, event, text) {
      const tip = container.querySelector(".tooltip");
      const box = container.getBoundingClientRect();
      tip.textContent = text;
      tip.classList.add("show");
      tip.style.left = `${Math.min(box.width - tip.offsetWidth - 8, Math.max(8, event.clientX - box.left + 12))}px`;
      tip.style.top = `${Math.max(8, event.clientY - box.top - 38)}px`;
    }

    function hideTooltip(container) {
      const tip = container.querySelector(".tooltip");
      if (tip) tip.classList.remove("show");
    }

    function renderTables() {
      const items = history.items || [];
      const infos = items.map((item) => ({ item, ...latestInfo(item) })).filter((info) => info.latest);
      document.getElementById("latestRows").innerHTML = infos.map((info) => {
        const cls = info.change > 0 ? "up" : info.change < 0 ? "down" : "muted";
        return `<tr><td>${info.item}</td><td>${fmt(info.latest.value)}</td><td class="${cls}">${pct(info.change)}</td><td>${info.count}</td></tr>`;
      }).join("");
      document.getElementById("dateRows").innerHTML = (history.rows || []).slice().reverse().map((row) => {
        const count = row.values ? Object.keys(row.values).length : 0;
        return `<tr><td>${row.date}</td><td>${count}</td></tr>`;
      }).join("");
    }

    function renderAll() {
      if (!history || history.app !== "lostark-material-price-history") {
        document.body.innerHTML = '<main class="app"><div class="error">材料价格历史数据加载失败。</div></main>';
        return;
      }
      const rows = history.rows || [];
      document.getElementById("subtitle").textContent = `已收录 ${rows.length} 个日期，最新 ${rows[rows.length - 1]?.date || "—"}`;
      renderKpis();
      renderChart();
      renderTables();
    }

    document.getElementById("range").addEventListener("change", (event) => {
      state.range = event.target.value;
      renderChart();
    });
    document.getElementById("search").addEventListener("input", (event) => {
      state.search = event.target.value;
      renderChart();
    });

    renderAll();
  </script>
</body>
</html>
