<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>强化材料价格趋势</title>
  <style>
    :root{--bg:#f6f8fb;--text:#111827;--muted:#64748b;--line:#e5e7eb;--shadow:0 14px 34px rgba(15,23,42,.08);--red:#dc2626;--green:#059669}
    *{box-sizing:border-box}
    body{margin:0;font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;color:var(--text);background:linear-gradient(180deg,#f8fafc 0%,var(--bg) 100%)}
    .app{max-width:1380px;margin:0 auto;padding:24px 22px 36px}
    .topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;margin-bottom:18px}
    h1{margin:0;font-size:30px;line-height:1.15;font-weight:900}
    .subtitle{margin-top:7px;color:var(--muted);font-size:14px}
    .actions,.tools{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    .actions{position:relative}
    .btn{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);border-radius:999px;background:#fff;color:#111827;padding:9px 14px;font-size:13px;font-weight:850;text-decoration:none;cursor:pointer;box-shadow:none}
    .grid{display:grid;gap:16px}
    .card{background:rgba(255,255,255,.94);border:1px solid rgba(229,231,235,.95);border-radius:12px;box-shadow:var(--shadow)}
    .summary-sidebar{position:fixed;left:18px;top:96px;z-index:25;width:260px;max-height:calc(100vh - 120px);padding:12px;overflow:auto}
    .summary-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
    .summary-head h2{margin:0;font-size:16px;line-height:1.2;font-weight:950}
    .summary-toggle{width:30px;height:30px;border:1px solid var(--line);border-radius:9px;background:#fff;color:#111827;font-size:16px;font-weight:950;line-height:1;cursor:pointer}
    .summary-list{display:grid;gap:10px}
    .summary-sidebar.collapsed{width:46px;padding:8px;overflow:hidden}
    .summary-sidebar.collapsed .summary-head h2,.summary-sidebar.collapsed .summary-list{display:none}
    .summary-sidebar.collapsed .summary-head{justify-content:center;margin:0}
    .kpi{padding:13px 13px 12px;min-height:104px}
    .kpi span{display:block;color:var(--muted);font-size:12px;font-weight:850;margin-bottom:8px}
    .kpi b{display:block;font-size:23px;line-height:1.14;font-weight:950;word-break:break-word}
    .kpi em{display:block;margin-top:8px;color:var(--muted);font-size:12px;line-height:1.35;font-style:normal}
    .toolbar{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;padding:13px 20px;margin-bottom:16px}
    .toolbar h2{margin:0;font-size:20px;line-height:1.2;font-weight:900}
    .filter-panel{display:grid;gap:8px}
    .filter-row{display:flex;gap:8px;flex-wrap:wrap}
    .filter-btn{border:1px solid var(--line);border-radius:999px;background:#fff;color:#111827;padding:7px 12px;font-size:13px;font-weight:900;cursor:pointer}
    .filter-btn.active{border-color:#111827;background:#111827;color:#fff}
    .life-subfilters{display:none}
    .life-subfilters.open{display:flex}
    .select,.search{border:1px solid var(--line);border-radius:999px;background:#fff;color:#111827;padding:8px 12px;font-size:13px;font-weight:750;outline:0}
    .search{width:220px}
    .price-mode{display:flex;align-items:center;gap:8px}
    .price-mode-row{display:flex;align-items:center;gap:8px}
    .ratio-note{position:fixed;left:18px;bottom:18px;z-index:28;max-width:min(420px,calc(100vw - 36px));padding:10px 14px;border:1px solid rgba(229,231,235,.95);border-radius:12px;background:rgba(255,255,255,.96);box-shadow:0 12px 28px rgba(15,23,42,.12);color:#334155;font-size:14px;font-weight:900;line-height:1.35}
    .ratio-input{display:none;width:118px;border:1px solid var(--line);border-radius:999px;background:#fff;color:#111827;padding:8px 12px;font-size:13px;font-weight:750;outline:0}
    .ratio-input.open{display:block}
    .charts{grid-template-columns:repeat(var(--chart-cols,3),minmax(0,1fr));align-items:start}
    .material-card{padding:16px 18px 18px;min-width:0;overflow:hidden;container-type:inline-size}
    .material-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:10px}
    .material-title{display:flex;align-items:center;gap:10px;min-width:0}
    .material-icon{width:42px;height:42px;border-radius:8px;border:1px solid #dbe3ee;background:#f8fafc;object-fit:cover;flex:0 0 auto}
    .material-title h3{margin:0;font-size:18px;line-height:1.22;font-weight:950;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .material-meta{margin-top:3px;color:var(--muted);font-size:12px;font-weight:750}
    .price-box{text-align:right;white-space:nowrap}
    .price-box b{display:block;font-size:23px;line-height:1.1;font-weight:950}
    .price-box span{display:block;margin-top:5px;font-size:12px;font-weight:850}
    .chart-wrap{height:var(--chart-height,260px);width:100%;position:relative;overflow:hidden;border:1px solid #e2eaf3;border-radius:10px;background:#fff}
    .chart-wrap svg{display:block;width:100%;height:100%}
    .gridline{stroke:#dde7f2;stroke-width:1}
    .axis{fill:#111827;font-size:11px;font-weight:850}
    .tick{fill:#111827;font-size:10.5px}
    .series{fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 3px 4px rgba(15,23,42,.08))}
    .latest-guide{stroke-width:1;stroke-dasharray:4 4;opacity:.55;pointer-events:none}
    .point-guide{stroke:#8392a7;stroke-width:1;stroke-dasharray:3 3;opacity:0}
    .point-hit{fill:transparent;stroke:none;pointer-events:all}
    .point-dot{opacity:0;stroke:#fff;stroke-width:2;transition:opacity .12s ease}
    .chart-point:hover .point-guide,.chart-point:focus .point-guide,.chart-point:hover .point-dot,.chart-point:focus .point-dot{opacity:1}
    .latest-dot{stroke:#fff;stroke-width:2.5;pointer-events:none}
    .latest-label{pointer-events:none}
    .latest-label text{fill:#fff;font-size:10.5px;font-weight:900}
    .empty{padding:26px;color:#64748b;background:#f9fafb;border:1px dashed #d1d5db;border-radius:10px;text-align:center;font-size:13px}
    .up{color:var(--green)}
    .down{color:var(--red)}
    .muted{color:var(--muted)}
    .tooltip{position:fixed;z-index:20;display:none;pointer-events:none;border:1px solid #334b68;border-radius:9px;background:rgba(9,23,42,.94);box-shadow:0 12px 28px rgba(9,23,42,.24);color:#fff;padding:9px 11px;font-size:12px;line-height:1.55;white-space:nowrap}
    .tooltip.show{display:block}
    .settings-panel{position:absolute;right:0;top:46px;z-index:30;width:270px;display:none;padding:14px;background:rgba(255,255,255,.98);border:1px solid var(--line);border-radius:12px;box-shadow:0 18px 42px rgba(15,23,42,.16)}
    .settings-panel.open{display:block}
    .settings-title{margin:0 0 10px;font-size:15px;font-weight:950}
    .settings-label{display:block;margin-bottom:8px;color:var(--muted);font-size:12px;font-weight:850}
    .segmented{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px}
    .segmented button{border:1px solid var(--line);border-radius:9px;background:#fff;color:#111827;padding:8px 0;font-size:13px;font-weight:900;cursor:pointer}
    .segmented button.active{border-color:#111827;background:#111827;color:#fff}
    @container (max-width: 320px){
      .material-head{gap:8px}
      .material-title{gap:8px}
      .material-icon{width:38px;height:38px}
      .material-title h3{font-size:clamp(13px,5.1cqw,17px)}
      .material-meta{font-size:11px}
      .price-box b{font-size:clamp(18px,7.2cqw,22px)}
      .price-box span{font-size:11px}
    }
    @container (max-width: 280px){
      .material-card{padding:14px 16px 16px}
      .material-title h3{font-size:clamp(12px,5.4cqw,15px)}
      .price-box b{font-size:clamp(16px,7.4cqw,20px)}
    }
    @media(max-width:1680px){.summary-sidebar{left:12px;width:230px}.app{max-width:1360px}}
    @media(max-width:1460px){.summary-sidebar{left:10px;top:88px;width:min(260px,calc(100vw - 20px));max-height:calc(100vh - 110px)}.summary-sidebar.collapsed{width:46px}}
    @media(max-width:960px){.topbar,.toolbar{display:block}.actions,.tools{justify-content:flex-start;margin-top:12px}.settings-panel{left:0;right:auto}.charts{grid-template-columns:1fr}.summary-sidebar{top:84px}h1{font-size:26px}.material-title h3{white-space:normal}}
  </style>

</head>
<body>
  <main class="app">
    <section class="topbar">
      <div>
        <h1>强化材料价格趋势</h1>
        <div id="subtitle" class="subtitle">读取材料价格历史中...</div>
      </div>
      <div class="actions">
        <a class="btn" href="../index.html">返回首页</a>
        <button id="settingsBtn" class="btn" type="button" aria-expanded="false" aria-controls="settingsPanel">设置</button>
        <div id="settingsPanel" class="settings-panel" role="dialog" aria-label="图表设置">
          <h2 class="settings-title">图表设置</h2>
          <label class="settings-label">每行显示</label>
          <div id="columnOptions" class="segmented" role="group" aria-label="每行图表数量">
            <button type="button" data-cols="1">1</button>
            <button type="button" data-cols="2">2</button>
            <button type="button" data-cols="3">3</button>
            <button type="button" data-cols="4">4</button>
          </div>
        </div>
      </div>
    </section>

    <section class="card toolbar">
      <div>
        <div class="filter-panel" aria-label="材料分类筛选">
          <div id="mainFilters" class="filter-row" role="group" aria-label="材料大类">
            <button class="filter-btn" type="button" data-main-filter="enhance">强化材料</button>
            <button class="filter-btn" type="button" data-main-filter="life">生活材料</button>
          </div>
          <div id="lifeFilters" class="filter-row life-subfilters" role="group" aria-label="生活材料分类">
            <button class="filter-btn" type="button" data-life-filter="all">全部</button>
            <button class="filter-btn" type="button" data-life-filter="plant">植物</button>
            <button class="filter-btn" type="button" data-life-filter="logging">伐木</button>
            <button class="filter-btn" type="button" data-life-filter="mining">采矿</button>
            <button class="filter-btn" type="button" data-life-filter="hunting">狩猎</button>
            <button class="filter-btn" type="button" data-life-filter="fishing">钓鱼</button>
            <button class="filter-btn" type="button" data-life-filter="archaeology">考古</button>
          </div>
        </div>
      </div>
      <div class="tools">
        <div class="price-mode">
          <div class="price-mode-row">
            <select id="priceMode" class="select" aria-label="价格显示方式">
              <option value="gold">金币价格</option>
              <option value="mail">邮寄比例 RMB</option>
              <option value="auction">拍卖比例 RMB</option>
              <option value="custom">自定义比例 RMB</option>
            </select>
            <input id="customRatio" class="ratio-input" type="number" min="1" step="1" placeholder="金币/元" aria-label="自定义金币比例">
          </div>
        </div>
        <input id="search" class="search" type="search" placeholder="筛选材料">
        <select id="sort" class="select">
          <option value="default">默认排序</option>
          <option value="name">按名称</option>
          <option value="priceDesc">价格高到低</option>
          <option value="priceAsc">价格低到高</option>
          <option value="changeDesc">涨幅高到低</option>
          <option value="changeAsc">跌幅高到低</option>
        </select>
        <select id="range" class="select">
          <option value="auto">自适应列宽</option>
          <option value="all">全部</option>
          <option value="30">近30天</option>
          <option value="14">近14天</option>
          <option value="7">近7天</option>
        </select>
      </div>
    </section>

    <aside id="summarySidebar" class="card summary-sidebar">
      <div class="summary-head">
        <h2>市场概览</h2>
        <button id="summaryToggle" class="summary-toggle" type="button" aria-label="收起市场概览" aria-expanded="true">‹</button>
      </div>
      <section id="kpis" class="summary-list"></section>
    </aside>

    <section id="charts" class="grid charts"></section>
  </main>
  <div id="ratioNote" class="ratio-note">按金币显示</div>
  <div id="tooltip" class="tooltip"></div>

  <script src="../data/dashboard-state.js"></script>
  <script src="https://unpkg.com/pinyin-pro"></script>
  <script src="../assets/js/pinyin-search.js"></script>
  <script>
    let history = window.LOSTARK_PUBLIC_MATERIAL_PRICE_HISTORY;
    const dashboardState = window.LOSTARK_PUBLIC_DASHBOARD_STATE || {};
    const colors = ["#2563eb","#d97706","#059669","#dc2626","#7c3aed","#0891b2","#ca8a04","#db2777","#475569","#16a34a"];
    const savedCols = Number(localStorage.getItem("lostarkMaterialTrendColumns") || 3);
    const savedSummaryRaw = localStorage.getItem("lostarkMaterialTrendSummaryCollapsed");
    const savedSort = localStorage.getItem("lostarkMaterialTrendSort") || "default";
    const savedMainFilter = localStorage.getItem("lostarkMaterialTrendMainFilter") || "enhance";
    const savedLifeFilter = localStorage.getItem("lostarkMaterialTrendLifeFilter") || "all";
    const savedPriceMode = localStorage.getItem("lostarkMaterialTrendPriceMode") || "gold";
    const isNarrowScreen = () => window.matchMedia("(max-width: 1460px)").matches;
    const LIFE_CATEGORY_KEYWORDS = {
      plant: ["野花"],
      logging: ["木材"],
      mining: ["矿石"],
      hunting: ["生肉", "皮革", "狩猎结晶"],
      fishing: ["太阳鲤", "太阳鲤鱼", "鲜鱼", "海鲜", "钓鱼结晶"],
      archaeology: ["遗物", "考古结晶"]
    };
    const state = {
      range: localStorage.getItem("lostarkMaterialTrendRange") || "auto",
      search: "",
      sort: ["default", "name", "priceDesc", "priceAsc", "changeDesc", "changeAsc"].includes(savedSort) ? savedSort : "default",
      mainFilter: ["enhance", "life"].includes(savedMainFilter) ? savedMainFilter : "enhance",
      lifeFilter: ["all", ...Object.keys(LIFE_CATEGORY_KEYWORDS)].includes(savedLifeFilter) ? savedLifeFilter : "all",
      priceMode: ["gold", "mail", "auction", "custom"].includes(savedPriceMode) ? savedPriceMode : "gold",
      customRatio: "",
      cols: [1, 2, 3, 4].includes(savedCols) ? savedCols : 3,
      summaryCollapsed: savedSummaryRaw == null ? isNarrowScreen() : savedSummaryRaw === "1"
    };

    const fmt = (n) => n == null ? "—" : Math.round(n).toLocaleString("zh-CN");
    const money = (n) => n == null || !Number.isFinite(n) ? "—" : `¥${Number(n).toFixed(2)}`;
    const activeFmt = (n) => state.priceMode === "gold" ? fmt(n) : money(n);
    const pct = (n) => {
      if (n == null || !Number.isFinite(n)) return "—";
      const sign = n > 0 ? "+" : "";
      return `${sign}${n.toFixed(2)}%`;
    };
    const esc = (value) => String(value).replace(/[&<>"']/g, (ch) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
    const shortDate = (s) => String(s || "").replace(/^[0-9]{4}-/, "");
    const iconUrl = (name) => `../assets/${encodeURIComponent(name)}.jpg`;
    const entryValue = (entry) => {
      if (!entry) return null;
      const value = entry.lowest ?? entry.value;
      const num = Number(value);
      return Number.isFinite(num) ? num : null;
    };
    const rateOf = (txn) => txn && txn.gold > 0 && txn.price > 0 ? txn.gold / txn.price : null;
    const maxFinite = (values) => {
      const arr = values.filter(Number.isFinite);
      return arr.length ? Math.max(...arr) : null;
    };
    const chartBounds = (min, max) => {
      const span = max - min;
      if (state.priceMode === "gold") {
        const pad = Math.max(1, span * 0.18);
        return { min: min - pad, max: max + pad };
      }
      const base = Math.max(max, min, 0.01);
      const center = (min + max) / 2;
      const minWindow = Math.max(0.004, base * 0.5);
      const targetWindow = span > 0 ? Math.max(span * 1.45, minWindow) : minWindow;
      const maxWindow = Math.max(minWindow, base * 0.7);
      const windowSize = Math.min(targetWindow, maxWindow);
      let yMin = center - windowSize / 2;
      let yMax = center + windowSize / 2;
      if (yMin < 0 && center < windowSize * 0.55) {
        yMax -= yMin;
        yMin = 0;
      }
      return { min: yMin, max: yMax };
    };
    const goldRatesByDate = (() => {
      const map = new Map();
      (Array.isArray(dashboardState.goldTxns) ? dashboardState.goldTxns : []).forEach((txn) => {
        if (!txn.date) return;
        const rate = rateOf(txn);
        if (!Number.isFinite(rate)) return;
        if (!map.has(txn.date)) map.set(txn.date, { mail: [], auction: [] });
        const bucket = txn.type === "邮寄交易" ? "mail" : "auction";
        map.get(txn.date)[bucket].push(rate);
      });
      return new Map(Array.from(map.entries()).map(([date, value]) => [date, {
        mail: maxFinite(value.mail),
        auction: maxFinite(value.auction)
      }]));
    })();

    function ratioForDate(date) {
      if (state.priceMode === "gold") return 1;
      if (state.priceMode === "custom") return Number(state.customRatio) > 0 ? Number(state.customRatio) : null;
      return goldRatesByDate.get(date)?.[state.priceMode] || null;
    }

    function latestMaterialDate() {
      return (history.rows || []).slice(-1)[0]?.date || "";
    }

    function ratioNoteText() {
      const date = latestMaterialDate();
      if (state.priceMode === "gold") return "当前按金币显示材料价格";
      if (state.priceMode === "custom") {
        const ratio = Number(state.customRatio);
        return ratio > 0 ? `自定义比例 ${fmt(ratio)} 金/元` : "自定义比例：请输入金币/元";
      }
      const ratio = ratioForDate(date);
      const label = state.priceMode === "mail" ? "邮寄最高比例" : "拍卖最高比例";
      return ratio ? `${date} · ${label} ${fmt(ratio)} 金/元` : `${date} · 无当日${label}比例`;
    }

    function displayValue(point) {
      if (!point || point.value == null) return null;
      if (state.priceMode === "gold") return point.value;
      const ratio = ratioForDate(point.date);
      return ratio > 0 ? point.value / ratio : null;
    }

    function rowsInRange() {
      if (!history || !Array.isArray(history.rows)) return [];
      const rows = history.rows.slice().sort((a, b) => String(a.date).localeCompare(String(b.date)));
      if (state.range === "all") return rows;
      const autoLimit = state.cols === 1 ? 30 : state.cols === 2 ? 14 : 7;
      const limit = state.range === "auto" ? autoLimit : Number(state.range);
      return rows.slice(-limit);
    }

    function allPoints(item, rows = history.rows || []) {
      return rows.map((row, index) => {
        const entry = row.values && row.values[item];
        return { index, date: row.date, value: entryValue(entry), entry: entry || null };
      }).filter((point) => point.value != null && Number.isFinite(point.value));
    }

    function lifeCategoryOf(name) {
      return Object.entries(LIFE_CATEGORY_KEYWORDS).find(([, keywords]) => keywords.some((keyword) => name.includes(keyword)))?.[0] || null;
    }

    function itemMatchesCategory(name) {
      const category = lifeCategoryOf(name);
      if (state.mainFilter === "enhance") return !category;
      if (!category) return false;
      return state.lifeFilter === "all" || category === state.lifeFilter;
    }

    function visibleItems() {
      const q = state.search.trim();
      const items = (history.items || []).filter((name) => itemMatchesCategory(name) && (!q || window.LostarkPinyinSearch?.match(name, q) || name.includes(q)));
      if (state.sort === "name") {
        return items.sort((a, b) => a.localeCompare(b, "zh-Hans-CN"));
      }
      if (state.sort === "priceDesc" || state.sort === "priceAsc") {
        return items.sort((a, b) => {
          const av = latestInfo(a).latestDisplay ?? -Infinity;
          const bv = latestInfo(b).latestDisplay ?? -Infinity;
          return state.sort === "priceDesc" ? bv - av : av - bv;
        });
      }
      if (state.sort === "changeDesc" || state.sort === "changeAsc") {
        return items.sort((a, b) => {
          const av = latestInfo(a).change ?? 0;
          const bv = latestInfo(b).change ?? 0;
          return state.sort === "changeDesc" ? bv - av : av - bv;
        });
      }
      return items;
    }

    function latestInfo(item) {
      const pts = allPoints(item);
      const latest = pts[pts.length - 1] || null;
      const prev = pts[pts.length - 2] || null;
      const latestDisplay = displayValue(latest);
      const prevDisplay = displayValue(prev);
      const change = latestDisplay != null && prevDisplay ? (latestDisplay - prevDisplay) / prevDisplay * 100 : null;
      const prevAvg = latest?.entry?.prevAvg != null ? Number(latest.entry.prevAvg) : null;
      const prevAvgDisplay = latest && prevAvg != null ? displayValue({ date: latest.date, value: prevAvg }) : null;
      const vsPrevAvg = latestDisplay != null && prevAvgDisplay ? (latestDisplay - prevAvgDisplay) / prevAvgDisplay * 100 : null;
      return { latest, prev, latestDisplay, prevDisplay, change, prevAvg, prevAvgDisplay, vsPrevAvg, count: pts.length };
    }

    function renderKpis() {
      const items = history.items || [];
      const infos = items.map((item) => ({ item, ...latestInfo(item) })).filter((info) => info.latest);
      const rising = infos.filter((info) => info.change > 0).length;
      const falling = infos.filter((info) => info.change < 0).length;
      const biggest = infos.filter((info) => info.change != null).sort((a, b) => Math.abs(b.change) - Math.abs(a.change))[0];
      const lastDate = (history.rows || []).slice(-1)[0]?.date || "—";
      document.getElementById("kpis").innerHTML = [
        ["最大波动", biggest ? biggest.item : "—", biggest ? pct(biggest.change) : "—"],
        ["最新日期", lastDate, `${items.length} 个材料`],
        ["上涨材料", rising, "较上一条记录"],
        ["下跌材料", falling, "较上一条记录"]
      ].map(([label, value, note]) => `<article class="card kpi"><span>${label}</span><b>${value}</b><em>${note}</em></article>`).join("");
    }

    function renderMiniChart(item, itemIndex, width, height) {
      const rows = rowsInRange();
      const pts = allPoints(item, rows).map((point) => ({ ...point, displayValue: displayValue(point) })).filter((point) => point.displayValue != null && Number.isFinite(point.displayValue));
      const c = colors[itemIndex % colors.length];
      if (!pts.length) return '<div class="empty">当前范围没有数据</div>';

      const values = pts.map((p) => p.displayValue);
      const min = Math.min(...values);
      const max = Math.max(...values);
      const bounds = chartBounds(min, max);
      const yMin = bounds.min;
      const yMax = bounds.max;
      const w = Math.max(320, Math.round(width || 620));
      const h = Math.max(220, Math.round(height || 260));
      const tickValues = Array.from({ length: 4 }, (_, i) => yMax - i * (yMax - yMin) / 3);
      const yAxisWidth = Math.min(112, Math.max(56, Math.max(...tickValues.map((value) => activeFmt(value).length)) * 7 + 18));
      const m = { l: yAxisWidth, r: 18, t: 18, b: 32 };
      const x = (i) => m.l + i * (w - m.l - m.r) / Math.max(1, rows.length - 1);
      const y = (v) => h - m.b - (v - yMin) / Math.max(1, yMax - yMin) * (h - m.t - m.b);
      const ticks = rows.map((_, i) => i).filter((i) => i === 0 || i === rows.length - 1 || i % Math.max(1, Math.ceil(rows.length / 5)) === 0);
      const path = pts.map((p, i) => `${i ? "L" : "M"}${x(p.index).toFixed(1)},${y(p.displayValue).toFixed(1)}`).join(" ");
      const latestPoint = pts[pts.length - 1];
      const latestX = x(latestPoint.index);
      const latestY = y(latestPoint.displayValue);
      const latestLabel = activeFmt(latestPoint.displayValue);
      const latestLabelWidth = Math.max(54, Math.min(104, Array.from(latestLabel).length * 7 + 16));
      const latestLabelX = w - m.r - latestLabelWidth;
      const latestLabelY = Math.max(m.t + 2, Math.min(h - m.b - 24, latestY - 11));
      let svg = `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet">`;
      for (let i = 0; i < 4; i++) {
        const gy = m.t + i * (h - m.t - m.b) / 3;
        const value = tickValues[i];
        const tickLabel = state.priceMode !== "gold" && value < 0 ? "" : activeFmt(value);
        svg += `<line class="gridline" x1="${m.l}" y1="${gy}" x2="${w - m.r}" y2="${gy}"/><text class="tick" x="${m.l - 8}" y="${gy + 4}" text-anchor="end">${tickLabel}</text>`;
      }
      ticks.forEach((i) => {
        svg += `<line class="gridline" x1="${x(i)}" y1="${m.t}" x2="${x(i)}" y2="${h - m.b}" opacity=".45"/><text class="tick" x="${x(i)}" y="${h - 10}" text-anchor="middle">${shortDate(rows[i].date)}</text>`;
      });
      svg += `<path class="series" d="${path}" stroke="${c}"/><line class="latest-guide" x1="${m.l}" y1="${latestY}" x2="${w - m.r}" y2="${latestY}" stroke="${c}"/>`;
      pts.forEach((p) => {
        const ratio = ratioForDate(p.date);
        const parts = [`${p.date}　${item}：${activeFmt(p.displayValue)}`];
        if (state.priceMode !== "gold" && ratio) parts.push(`比例：${fmt(ratio)}金/元`);
        if (p.entry?.prevAvg != null) parts.push(`昨均：${activeFmt(displayValue({ date: p.date, value: Number(p.entry.prevAvg) }))}`);
        if (p.entry?.recentDeal != null) parts.push(`成交：${activeFmt(displayValue({ date: p.date, value: Number(p.entry.recentDeal) }))}`);
        svg += `<g class="chart-point" tabindex="0" data-tip="${esc(parts.join("　"))}"><line class="point-guide" x1="${x(p.index)}" y1="${m.t}" x2="${x(p.index)}" y2="${h - m.b}"/><circle class="point-hit" cx="${x(p.index)}" cy="${y(p.displayValue)}" r="10"/><circle class="point-dot" cx="${x(p.index)}" cy="${y(p.displayValue)}" r="4" fill="${c}"/></g>`;
      });
      svg += `<circle class="latest-dot" cx="${latestX}" cy="${latestY}" r="4.5" fill="${c}"/><g class="latest-label"><rect x="${latestLabelX}" y="${latestLabelY}" width="${latestLabelWidth}" height="22" rx="5" fill="${c}"/><text x="${latestLabelX + latestLabelWidth / 2}" y="${latestLabelY + 14.5}" text-anchor="middle">${latestLabel}</text></g><text class="axis" x="${m.l}" y="13">${state.priceMode === "gold" ? "金币价格" : "RMB价格"}</text></svg>`;
      return svg;
    }

    function renderChartSvgs() {
      document.querySelectorAll("[data-chart-item]").forEach((wrap) => {
        const item = wrap.dataset.chartItem;
        const index = Number(wrap.dataset.chartIndex);
        wrap.innerHTML = renderMiniChart(item, index, wrap.clientWidth, wrap.clientHeight);
      });
      document.querySelectorAll("[data-tip]").forEach((node) => {
        node.addEventListener("mousemove", (event) => showTooltip(event, node.dataset.tip));
        node.addEventListener("mouseleave", hideTooltip);
      });
    }

    function renderCharts() {
      const items = visibleItems();
      const rows = rowsInRange();
      const cards = items.map((item, index) => {
        const info = latestInfo(item);
        const avgCls = info.vsPrevAvg > 0 ? "up" : info.vsPrevAvg < 0 ? "down" : "muted";
        const meta = rows.length ? `${shortDate(rows[0].date)} - ${shortDate(rows[rows.length - 1].date)}` : "";
        return `<article class="card material-card">
          <div class="material-head">
            <div class="material-title">
              <img class="material-icon" src="${iconUrl(item)}" alt="${item}" loading="lazy">
              <div>
                <h3>${item}</h3>
                <div class="material-meta">${meta}</div>
              </div>
            </div>
            <div class="price-box">
              <b>${activeFmt(info.latestDisplay)}</b>
              <span class="${avgCls}">较昨均 ${pct(info.vsPrevAvg)}</span>
            </div>
          </div>
          <div class="chart-wrap" data-chart-item="${esc(item)}" data-chart-index="${index}"></div>
        </article>`;
      }).join("");
      document.getElementById("charts").innerHTML = cards || '<div class="empty">没有匹配的材料。</div>';
      renderChartSvgs();
    }

    function applyColumnSetting() {
      document.documentElement.style.setProperty("--chart-cols", state.cols);
      const height = state.cols === 1 ? 260 : state.cols === 2 ? 260 : state.cols === 3 ? 250 : 235;
      document.documentElement.style.setProperty("--chart-height", `${height}px`);
      document.querySelectorAll("[data-cols]").forEach((button) => {
        button.classList.toggle("active", Number(button.dataset.cols) === state.cols);
      });
    }

    function applySummarySetting() {
      const sidebar = document.getElementById("summarySidebar");
      const button = document.getElementById("summaryToggle");
      sidebar.classList.toggle("collapsed", state.summaryCollapsed);
      button.textContent = state.summaryCollapsed ? "›" : "‹";
      button.setAttribute("aria-expanded", String(!state.summaryCollapsed));
      button.setAttribute("aria-label", state.summaryCollapsed ? "展开市场概览" : "收起市场概览");
    }

    function applyFilterSetting() {
      document.querySelectorAll("[data-main-filter]").forEach((button) => {
        button.classList.toggle("active", button.dataset.mainFilter === state.mainFilter);
      });
      document.getElementById("lifeFilters").classList.toggle("open", state.mainFilter === "life");
      document.querySelectorAll("[data-life-filter]").forEach((button) => {
        button.classList.toggle("active", button.dataset.lifeFilter === state.lifeFilter);
      });
    }

    function applyPriceModeSetting() {
      document.getElementById("priceMode").value = state.priceMode;
      const input = document.getElementById("customRatio");
      input.value = state.customRatio || "";
      input.classList.toggle("open", state.priceMode === "custom");
      document.getElementById("ratioNote").textContent = ratioNoteText();
    }

    function showTooltip(event, text) {
      const tip = document.getElementById("tooltip");
      tip.textContent = text;
      tip.classList.add("show");
      const gap = 12;
      const edge = 8;
      const tipW = tip.offsetWidth || 180;
      const tipH = tip.offsetHeight || 44;
      let left = event.clientX + gap;
      if (left + tipW > window.innerWidth - edge) {
        left = event.clientX - tipW - gap;
      }
      left = Math.max(edge, Math.min(window.innerWidth - tipW - edge, left));
      let top = event.clientY - tipH - 10;
      if (top < edge) {
        top = event.clientY + 16;
      }
      top = Math.max(edge, Math.min(window.innerHeight - tipH - edge, top));
      tip.style.left = `${left}px`;
      tip.style.top = `${top}px`;
    }

    function hideTooltip() {
      document.getElementById("tooltip").classList.remove("show");
    }

    function renderAll() {
      if (!history || history.app !== "lostark-material-price-history") {
        document.body.innerHTML = '<main class="app"><div class="empty">材料价格历史数据加载失败。</div></main>';
        return;
      }
      const rows = history.rows || [];
      document.getElementById("subtitle").textContent = `已收录 ${rows.length} 个日期，最新 ${rows[rows.length - 1]?.date || "—"}`;
      renderKpis();
      applyFilterSetting();
      applyPriceModeSetting();
      applyColumnSetting();
      applySummarySetting();
      document.getElementById("sort").value = state.sort;
      document.getElementById("range").value = state.range;
      renderCharts();
    }

    document.getElementById("range").addEventListener("change", (event) => {
      state.range = event.target.value;
      localStorage.setItem("lostarkMaterialTrendRange", state.range);
      renderCharts();
    });
    document.getElementById("search").addEventListener("input", (event) => {
      state.search = event.target.value;
      renderCharts();
    });
    document.getElementById("sort").addEventListener("change", (event) => {
      state.sort = event.target.value;
      localStorage.setItem("lostarkMaterialTrendSort", state.sort);
      renderCharts();
    });
    document.getElementById("priceMode").addEventListener("change", (event) => {
      state.priceMode = event.target.value;
      localStorage.setItem("lostarkMaterialTrendPriceMode", state.priceMode);
      applyPriceModeSetting();
      renderCharts();
    });
    document.getElementById("customRatio").addEventListener("input", (event) => {
      const value = Number(event.target.value);
      state.customRatio = Number.isFinite(value) && value > 0 ? value : "";
      if (state.priceMode === "custom") {
        applyPriceModeSetting();
        renderCharts();
      }
    });
    document.getElementById("mainFilters").addEventListener("click", (event) => {
      const button = event.target.closest("[data-main-filter]");
      if (!button) return;
      state.mainFilter = button.dataset.mainFilter;
      localStorage.setItem("lostarkMaterialTrendMainFilter", state.mainFilter);
      applyFilterSetting();
      renderCharts();
    });
    document.getElementById("lifeFilters").addEventListener("click", (event) => {
      const button = event.target.closest("[data-life-filter]");
      if (!button) return;
      state.lifeFilter = button.dataset.lifeFilter;
      localStorage.setItem("lostarkMaterialTrendLifeFilter", state.lifeFilter);
      applyFilterSetting();
      renderCharts();
    });
    document.getElementById("settingsBtn").addEventListener("click", () => {
      const panel = document.getElementById("settingsPanel");
      const isOpen = panel.classList.toggle("open");
      document.getElementById("settingsBtn").setAttribute("aria-expanded", String(isOpen));
    });
    document.getElementById("columnOptions").addEventListener("click", (event) => {
      const button = event.target.closest("[data-cols]");
      if (!button) return;
      state.cols = Number(button.dataset.cols);
      localStorage.setItem("lostarkMaterialTrendColumns", String(state.cols));
      applyColumnSetting();
      if (state.range === "auto") renderCharts();
      else requestAnimationFrame(renderChartSvgs);
    });
    document.getElementById("summaryToggle").addEventListener("click", () => {
      state.summaryCollapsed = !state.summaryCollapsed;
      localStorage.setItem("lostarkMaterialTrendSummaryCollapsed", state.summaryCollapsed ? "1" : "0");
      applySummarySetting();
      requestAnimationFrame(renderChartSvgs);
    });
    document.addEventListener("click", (event) => {
      const panel = document.getElementById("settingsPanel");
      const button = document.getElementById("settingsBtn");
      if (!panel.classList.contains("open")) return;
      if (panel.contains(event.target) || button.contains(event.target)) return;
      panel.classList.remove("open");
      button.setAttribute("aria-expanded", "false");
    });
    window.addEventListener("resize", () => {
      window.clearTimeout(window.__materialTrendResizeTimer);
      window.__materialTrendResizeTimer = window.setTimeout(() => {
        if (localStorage.getItem("lostarkMaterialTrendSummaryCollapsed") == null) {
          state.summaryCollapsed = isNarrowScreen();
          applySummarySetting();
        }
        renderChartSvgs();
      }, 120);
    });

    function loadLatestHistory() {
      return new Promise((resolve) => {
        const script = document.createElement("script");
        const cacheKey = Math.floor(Date.now() / 60000);
        script.src = `../data/material-price-history.js?v=${cacheKey}`;
        script.onload = () => {
          history = window.LOSTARK_PUBLIC_MATERIAL_PRICE_HISTORY;
          resolve();
        };
        script.onerror = () => resolve();
        document.head.append(script);
      });
    }

    loadLatestHistory().then(renderAll);
  </script>
</body>
</html>
